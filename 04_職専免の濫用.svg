<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 366" width="760" height="366" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="「職務専念義務免除」では適法化できない"><rect x="1.0" y="1.0" width="758.0" height="364.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">教職員関与</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「職務専念義務免除」では適法化できない</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="110.0" y="108.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="108.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="136.0" r="22" fill="#1e3a5f"/><text x="60.0" y="141.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><text x="130.0" y="133.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">形式的承認では適法化されない</text><text x="130.0" y="150.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">茅ヶ崎市職員派遣事件（最判平成10.4.24）――承認手続きがあっても公益性等を欠けば違法</text><line x1="60.0" y1="162.0" x2="60.0" y2="171.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 169 L60 178 L66 169 Z" fill="#bd9628"/><rect x="110.0" y="180.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="180.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="208.0" r="22" fill="#1e3a5f"/><text x="60.0" y="213.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><text x="130.0" y="205.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">別団体の一般会計事務は違法</text><text x="130.0" y="222.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">八王子市観光協会事件（東京地裁平成14.7.18）――市と別個の団体の会計事務従事は違法</text><line x1="60.0" y1="234.0" x2="60.0" y2="243.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 241 L60 250 L66 241 Z" fill="#bd9628"/><rect x="110.0" y="252.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="252.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="280.0" r="22" fill="#1e3a5f"/><text x="60.0" y="285.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><text x="130.0" y="277.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTA内部事務に「公益性」はない</text><text x="130.0" y="294.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">集金・会計・会員管理は団体の内部管理事務にすぎない</text><text x="32.0" y="336.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 最高裁平成10年4月24日判決／東京地裁平成14年7月18日判決</text></svg>