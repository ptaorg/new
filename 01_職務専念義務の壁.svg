<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="図解：職務専念義務の「壁」"><rect x="1.0" y="1.0" width="758.0" height="428.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">教職員関与</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">図解：職務専念義務の「壁」</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="110.0" width="338.0" height="212.0" rx="12" fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="1"/><rect x="32.0" y="110.0" width="338.0" height="4.0" rx="2" fill="#1e3a5f"/><rect x="390.0" y="110.0" width="338.0" height="212.0" rx="12" fill="#f3e8c4" fill-opacity="0.4" stroke="#bd9628" stroke-width="1"/><rect x="390.0" y="110.0" width="338.0" height="4.0" rx="2" fill="#bd9628"/><line x1="380.0" y1="104" x2="380.0" y2="328" stroke="#bd9628" stroke-width="3"/><text x="217.0" y="140.0" font-size="14.5" fill="#1e3a5f" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">公務（職務命令を出せる範囲）</text><text x="559.0" y="140.0" font-size="14.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">私的団体PTAの事務（命じられない）</text><circle cx="54" cy="166" r="3" fill="#1e3a5f"/><text x="66.0" y="170.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">授業・学級経営・生徒指導</text><circle cx="54" cy="196" r="3" fill="#1e3a5f"/><text x="66.0" y="200.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">校務分掌の事務</text><circle cx="54" cy="226" r="3" fill="#1e3a5f"/><text x="66.0" y="230.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校徴収金（準公金）の管理</text><circle cx="54" cy="256" r="3" fill="#1e3a5f"/><text x="66.0" y="260.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校行事の運営</text><circle cx="410.0" cy="166" r="3" fill="#bd9628"/><text x="422.0" y="170.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTA会計・集金</text><circle cx="410.0" cy="196" r="3" fill="#bd9628"/><text x="422.0" y="200.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">会員管理・名簿</text><circle cx="410.0" cy="226" r="3" fill="#bd9628"/><text x="422.0" y="230.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">役員選出・行事準備</text><circle cx="410.0" cy="256" r="3" fill="#bd9628"/><text x="422.0" y="260.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">広報・渉外の内部事務</text><rect x="32.0" y="336.0" width="696.0" height="36.0" rx="10" fill="#f8ebe8"/><text x="48.0" y="356.0" font-size="12" fill="#a8261b" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">校長が出せる職務命令は「公務」に限られる。学校とは別団体であるPTAの会計事務等を命じることはできない。</text><text x="32.0" y="400.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 地方公務員法35条（職務専念義務）／職務命令の限界</text></svg>