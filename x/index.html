<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>応援・カンパのお願い | PTA適正化推進委員会</title>
  <meta name="description" content="PTA運営の適正化に向けた公文書開示、資料整理、Web公開、自治体・学校への働きかけを継続するため、寄付・カンパでのご支援をお願いしています。">
  <link rel="canonical" href="https://ptaorg.com/x/">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body{margin:0;background:#f4f6f9;color:#0f2742;font-family:'Noto Sans JP',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.9}
    .support-page{max-width:920px;margin:0 auto;padding:56px 24px 72px}
    .support-panel{background:#fff;border:1px solid #dbe4ee;border-left:7px solid #ea580c;border-radius:0 22px 22px 0;padding:38px 42px;box-shadow:0 18px 44px rgba(5,17,31,.08)}
    .kicker{font-size:.78rem;font-weight:900;letter-spacing:.12em;color:#ea580c;text-transform:uppercase;margin-bottom:10px}
    h1{font-family:'Noto Serif JP',serif;font-size:clamp(1.7rem,5vw,2.6rem);line-height:1.35;margin:0 0 20px;color:#0f2742}
    p{margin:0 0 18px;color:#334155}
    .bank{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:20px 22px;margin:26px 0;color:#7c2d12}
    .bank strong{display:block;color:#9a3412;margin-bottom:6px}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
    .btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:999px;padding:12px 20px;font-weight:900}
    .btn-primary{background:#ea580c;color:#fff}.btn-secondary{background:#0f2742;color:#fff}
    .btn:hover{filter:brightness(.95)}
    @media(max-width:640px){.support-panel{padding:30px 24px}.actions{display:grid}.btn{width:100%}}
  </style>
</head>
<body>
  <main class="support-page">
    <section class="support-panel">
      <div class="kicker">Support</div>
      <h1>調査・資料公開の継続にご支援をお願いします。</h1>
      <p>PTA適正化推進委員会は、PTAの任意加入、公私分離、個人情報保護、会費徴収、教職員関与などについて、公文書開示、資料整理、Web公開、自治体・学校への働きかけを続けています。</p>
      <p>いただいたご支援は、各教育委員会への照会、開示請求費用、資料整理、Web公開、自治体・学校への移動・調査活動に活用します。</p>
      <div class="bank">
        <strong>ご支援について</strong>
        <p>現在、寄付・カンパの受け入れ方法は順次整備中です。ご支援・情報提供をご検討いただける場合は、まず下記メールアドレスまでご連絡ください。</p>
        <p><a href="mailto:info@ptaorg.com">info@ptaorg.com</a></p>
      </div>
      <div class="actions">
        <a class="btn btn-primary" href="mailto:info@ptaorg.com">問い合わせる</a>
        <a class="btn btn-secondary" href="/index.html">トップへ戻る</a>
      </div>
    </section>
  </main>
</body>
</html>
