<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 510" width="760" height="510" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="監督責任の不行使は「行政不作為」になる"><rect x="1.0" y="1.0" width="758.0" height="508.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">教育委員会</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">監督責任の不行使は「行政不作為」になる</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><line x1="64.0" y1="137.0" x2="64.0" y2="425.0" stroke="#bd9628" stroke-width="3"/><rect x="98.0" y="110.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7c9c4" stroke-width="1"/><rect x="98.0" y="110.0" width="5.0" height="54.0" rx="2.5" fill="#a8261b"/><text x="120.0" y="131.0" font-size="15.5" fill="#a8261b" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入会記録の不在＝明白な法的欠陥</text><text x="120.0" y="151.0" font-size="11.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">現場で違法が常態化していると認識可能</text><circle cx="64" cy="137.0" r="21" fill="#a8261b"/><text x="64.0" y="142.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">起</text><rect x="98.0" y="182.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="206.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">教委は学校・校長を指導監督する権限と義務</text><g transform="translate(679.0,209.0)"><rect x="-36.0" y="-13.0" width="72.0" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">地教行法</text></g><circle cx="64" cy="209.0" r="17" fill="#bd9628"/><text x="64.0" y="214.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><rect x="98.0" y="254.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="278.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">是正措置（適正化指導）を行わない</text><g transform="translate(673.25,281.0)"><rect x="-41.8" y="-13.0" width="83.5" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">行政不作為</text></g><circle cx="64" cy="281.0" r="17" fill="#bd9628"/><text x="64.0" y="286.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><rect x="98.0" y="326.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="350.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">違法状態の継続により損害が発生</text><g transform="translate(664.28,353.0)"><rect x="-50.7" y="-13.0" width="101.4" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">国家賠償法1条</text></g><circle cx="64" cy="353.0" r="17" fill="#bd9628"/><text x="64.0" y="358.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><rect x="98.0" y="398.0" width="630.0" height="54.0" rx="11" fill="#1e3a5f" stroke="#1e3a5f" stroke-width="1"/><text x="120.0" y="419.0" font-size="15.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">自治体への国家賠償請求の対象となりうる</text><text x="120.0" y="439.0" font-size="11.5" fill="#cdd8e6" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">「知らなかった」では済まされない</text><circle cx="64" cy="425.0" r="21" fill="#1e3a5f"/><text x="64.0" y="430.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">結</text><text x="32.0" y="480.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 地方教育行政法／国家賠償法</text></svg>