<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 344" width="760" height="344" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="「覚書があればOK」ではない"><rect x="1.0" y="1.0" width="758.0" height="341.9" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">施設利用</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「覚書があればOK」ではない</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="104.0" width="335.0" height="181.4" rx="13" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="104.0" width="335.0" height="4.0" rx="2" fill="#a8261b"/><text x="50.0" y="136.0" font-size="15" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">よくある誤解</text><circle cx="54" cy="158" r="3" fill="#a8261b"/><text x="68.0" y="162.0" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">校長とPTAで覚書を交わせば適法</text><circle cx="54" cy="184.45" r="3" fill="#a8261b"/><text x="68.0" y="188.4" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">覚書が代行徴収を正当化する</text><circle cx="54" cy="210.89999999999998" r="3" fill="#a8261b"/><text x="68.0" y="214.9" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">前例として固定化される</text><rect x="46.0" y="251.4" width="307.0" height="24.0" rx="12" fill="#f8ebe8"/><circle cx="60" cy="263.35" r="14" fill="#a8261b"/><path d="M55 258.35 l10 10 M65 258.35 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="78.0" y="267.4" font-size="12" fill="#a8261b" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">誤解</text><rect x="393.0" y="104.0" width="335.0" height="181.4" rx="13" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="393.0" y="104.0" width="335.0" height="4.0" rx="2" fill="#bd9628"/><text x="411.0" y="136.0" font-size="15" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">実際</text><circle cx="415.0" cy="158" r="3" fill="#bd9628"/><text x="429.0" y="162.0" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">実体が違法なら覚書では治らない</text><circle cx="415.0" cy="184.45" r="3" fill="#bd9628"/><text x="429.0" y="188.4" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">違法状態を固定化させる危険</text><circle cx="415.0" cy="210.89999999999998" r="3" fill="#bd9628"/><text x="429.0" y="214.9" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">覚書より「分離」が本筋</text><rect x="407.0" y="251.4" width="307.0" height="24.0" rx="12" fill="#f3e8c4"/><circle cx="421.0" cy="263.35" r="14" fill="#bd9628"/><path d="M421.0 257.35 v5 M421.0 267.35 v1.5" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="439.0" y="267.4" font-size="12" fill="#bd9628" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">要注意</text><text x="32.0" y="313.4" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 学校教育法137条／地方財政法</text></svg>