fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">目的・条件・費用が明確なら許可可能</text><g transform="translate(201.0,319)"><rect x="-47.3" y="-13.0" width="94.6" height="26" rx="13" fill="#e9f1ea"/><text x="0.0" y="4.5" font-size="11" fill="#1f7a45" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">137条 許可可</text></g><rect x="390.0" y="223.0" width="338.0" height="114.0" rx="12" fill="#fff" stroke="#a8261b" stroke-width="1"/><circle cx="414.0" cy="249" r="14" fill="#a8261b"/><path d="M409.0 244 l10 10 M419.0 244 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="434.0" y="245.0" font-size="12.8" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">違法運営（無根拠徴収・名簿流用）</text><text x="406.0" y="270.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">コンプライアンスを損ない「支障」に該当</text><g transform="translate(559.0,319)"><rect x="-35.0" y="-13.0" width="70.0" height="26" rx="13" fill="#f8ebe8"/><text x="0.0" y="4.5" font-size="11" fill="#a8261b" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">許可不可</text></g><text x="32.0" y="365.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 学校教育法137条</text></svg>