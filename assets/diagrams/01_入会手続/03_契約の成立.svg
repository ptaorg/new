<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 322" width="760" height="322" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="契約はどう成立するか――申込みと承諾"><rect x="1.0" y="1.0" width="758.0" height="320.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会手続</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">契約はどう成立するか――申込みと承諾</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="108.0" width="162.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="108.0" width="162.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="56.0" cy="138" r="14" fill="#1e3a5f"/><text x="56.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><text x="78.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">申込み</text><text x="48.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">保護者が入会申込書を提出</text><g transform="translate(194.0,161.0)"><line x1="2.0" y1="0.0" x2="7.0" y2="0.0" stroke="#bd9628" stroke-width="2.5"/><path d="M5 -6 L14 0 L5 6 Z" fill="#bd9628"/></g><rect x="210.0" y="108.0" width="162.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="210.0" y="108.0" width="162.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="234.0" cy="138" r="14" fill="#1e3a5f"/><text x="234.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><text x="256.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">承諾</text><text x="226.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAが受理・承認する</text><g transform="translate(372.0,161.0)"><line x1="2.0" y1="0.0" x2="7.0" y2="0.0" stroke="#bd9628" stroke-width="2.5"/><path d="M5 -6 L14 0 L5 6 Z" fill="#bd9628"/></g><rect x="388.0" y="108.0" width="162.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="388.0" y="108.0" width="162.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="412.0" cy="138" r="14" fill="#1e3a5f"/><text x="412.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><text x="434.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">契約成立</text><text x="404.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">会員関係が発生（民法522</text><text x="404.0" y="177.9" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">条）</text><g transform="translate(550.0,161.0)"><line x1="2.0" y1="0.0" x2="7.0" y2="0.0" stroke="#bd9628" stroke-width="2.5"/><path d="M5 -6 L14 0 L5 6 Z" fill="#bd9628"/></g><rect x="566.0" y="108.0" width="162.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="566.0" y="108.0" width="162.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="590.0" cy="138" r="14" fill="#1e3a5f"/><text x="590.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">4</text><text x="612.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">会費の根拠</text><text x="582.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">契約にもとづき正当に徴収</text><rect x="32.0" y="228.0" width="696.0" height="36.0" rx="10" fill="#f3e8c4"/><text x="48.0" y="248.0" font-size="12" fill="#7a5d14" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">※ 申込み・承諾のどちらかを欠けば契約は不成立。根拠なく徴収された会費は不当利得（民法703条）として返還義務が生じる。</text><text x="32.0" y="292.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 民法522条（契約の成立）・703条（不当利得）</text></svg>