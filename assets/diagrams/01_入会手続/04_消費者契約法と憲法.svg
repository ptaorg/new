<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 438" width="760" height="438" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="PTAは「事業者」、保護者は「消費者」"><rect x="1.0" y="1.0" width="758.0" height="436.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会手続</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTAは「事業者」、保護者は「消費者」</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="110.0" y="108.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="108.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="136.0" r="22" fill="#1e3a5f"/><text x="60.0" y="141.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><text x="130.0" y="133.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTAの事業者該当性</text><text x="130.0" y="150.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">継続的・反復的に役務を提供し会費を得る団体は「事業者」に当たりうる</text><line x1="60.0" y1="162.0" x2="60.0" y2="171.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 169 L60 178 L66 169 Z" fill="#bd9628"/><rect x="110.0" y="180.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="180.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="208.0" r="22" fill="#1e3a5f"/><text x="60.0" y="213.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><text x="130.0" y="205.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">みなし加入条項は無効（10条）</text><text x="130.0" y="222.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">消費者の不作為を承諾とみなし、利益を一方的に害する条項</text><line x1="60.0" y1="234.0" x2="60.0" y2="243.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 241 L60 250 L66 241 Z" fill="#bd9628"/><rect x="110.0" y="252.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="252.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="280.0" r="22" fill="#1e3a5f"/><text x="60.0" y="285.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><text x="130.0" y="277.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">不実告知等による取消権（4条）</text><text x="130.0" y="294.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">重要事項の不告知・誤認があれば意思表示を取り消せる</text><line x1="60.0" y1="306.0" x2="60.0" y2="315.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 313 L60 322 L66 313 Z" fill="#bd9628"/><rect x="110.0" y="324.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="324.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="352.0" r="22" fill="#1e3a5f"/><text x="60.0" y="357.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">4</text><text x="130.0" y="349.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「加入しない自由」（憲法21条）</text><text x="130.0" y="366.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">結社の自由は加入を強制されない自由を含む</text><text x="32.0" y="408.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 消費者契約法10条・4条／日本国憲法21条</text></svg>