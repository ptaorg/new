<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 606" width="760" height="606" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="みなし加入が崩す「ドミノ倒し」の無効性"><rect x="1.0" y="1.0" width="758.0" height="603.9" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会手続</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">みなし加入が崩す「ドミノ倒し」の無効性</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><line x1="64.0" y1="137.0" x2="64.0" y2="497.0" stroke="#bd9628" stroke-width="3"/><rect x="98.0" y="110.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7c9c4" stroke-width="1"/><rect x="98.0" y="110.0" width="5.0" height="54.0" rx="2.5" fill="#a8261b"/><text x="120.0" y="131.0" font-size="15.5" fill="#a8261b" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入会の意思確認がない（沈黙）</text><text x="120.0" y="151.0" font-size="11.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">承諾の意思表示が存在しない</text><circle cx="64" cy="137.0" r="21" fill="#a8261b"/><text x="64.0" y="142.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">起</text><rect x="98.0" y="182.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="206.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「みなし加入」条項は不当条項として無効</text><g transform="translate(655.31,209.0)"><rect x="-59.7" y="-13.0" width="119.4" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">消費者契約法10条</text></g><circle cx="64" cy="209.0" r="17" fill="#bd9628"/><text x="64.0" y="214.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><rect x="98.0" y="254.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="278.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">契約が成立せず、会員資格が法的に不明</text><g transform="translate(675.09,281.0)"><rect x="-39.9" y="-13.0" width="79.8" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">民法522条</text></g><circle cx="64" cy="281.0" r="17" fill="#bd9628"/><text x="64.0" y="286.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><rect x="98.0" y="326.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="350.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">会費を徴収する法的根拠が消滅</text><g transform="translate(675.09,353.0)"><rect x="-39.9" y="-13.0" width="79.8" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">民法703条</text></g><circle cx="64" cy="353.0" r="17" fill="#bd9628"/><text x="64.0" y="358.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><rect x="98.0" y="398.0" width="630.0" height="54.0" rx="11" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="120.0" y="422.0" font-size="15.5" fill="#1c232e" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">徴収済み会費は不当利得＝返還義務</text><g transform="translate(675.09,425.0)"><rect x="-39.9" y="-13.0" width="79.8" height="26" rx="13" fill="#f3e8c4"/><text x="0.0" y="4.5" font-size="11.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">民法703条</text></g><circle cx="64" cy="425.0" r="17" fill="#bd9628"/><text x="64.0" y="430.0" font-size="14" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">4</text><rect x="98.0" y="470.0" width="630.0" height="54.0" rx="11" fill="#1e3a5f" stroke="#1e3a5f" stroke-width="1"/><text x="120.0" y="491.0" font-size="15.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">非加入扱い・子への不利益は新たな違法を生む</text><text x="120.0" y="511.0" font-size="11.5" fill="#cdd8e6" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">差別的取扱いの禁止</text><circle cx="64" cy="497.0" r="21" fill="#1e3a5f"/><text x="64.0" y="502.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">結</text><text x="32.0" y="546.0" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">みなし加入は単独の不備ではなく、入口が崩れると会員資格・徴収根拠・返還義務まで連鎖的に崩れる。</text><text x="32.0" y="575.4" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 民法・消費者契約法／熊本地裁平成28年2月25日判決ほか</text></svg>