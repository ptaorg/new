<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 394" width="760" height="394" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="入会申込書が「ある世界」と「ない世界」"><rect x="1.0" y="1.0" width="758.0" height="391.7" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTA役員</text><line x1="32.0" y1="49.0" x2="84.2" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入会申込書が「ある世界」と「ない世界」</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="104.0" width="335.0" height="207.8" rx="13" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="104.0" width="335.0" height="4.0" rx="2" fill="#a8261b"/><text x="50.0" y="136.0" font-size="15" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入会申込書がない</text><circle cx="54" cy="158" r="3" fill="#a8261b"/><text x="68.0" y="162.0" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">会員の範囲が不明</text><circle cx="54" cy="184.45" r="3" fill="#a8261b"/><text x="68.0" y="188.4" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校名簿に依存</text><circle cx="54" cy="210.89999999999998" r="3" fill="#a8261b"/><text x="68.0" y="214.9" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">徴収根拠が不安定（不当利得リスク）</text><circle cx="54" cy="237.34999999999997" r="3" fill="#a8261b"/><text x="68.0" y="241.3" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">役員が法的責任を負う</text><rect x="46.0" y="277.8" width="307.0" height="24.0" rx="12" fill="#f8ebe8"/><circle cx="60" cy="289.8" r="14" fill="#a8261b"/><path d="M55 284.8 l10 10 M65 284.8 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="78.0" y="293.8" font-size="12" fill="#a8261b" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">危険</text><rect x="393.0" y="104.0" width="335.0" height="207.8" rx="13" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="393.0" y="104.0" width="335.0" height="4.0" rx="2" fill="#1f7a45"/><text x="411.0" y="136.0" font-size="15" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入会申込書がある</text><circle cx="415.0" cy="158" r="3" fill="#1f7a45"/><text x="429.0" y="162.0" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">会員が明確</text><circle cx="415.0" cy="184.45" r="3" fill="#1f7a45"/><text x="429.0" y="188.4" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">個人情報を直接取得</text><circle cx="415.0" cy="210.89999999999998" r="3" fill="#1f7a45"/><text x="429.0" y="214.9" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">徴収の根拠が明確</text><circle cx="415.0" cy="237.34999999999997" r="3" fill="#1f7a45"/><text x="429.0" y="241.3" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">役員を法的リスクから守る</text><rect x="407.0" y="277.8" width="307.0" height="24.0" rx="12" fill="#e9f1ea"/><circle cx="421.0" cy="289.8" r="14" fill="#1f7a45"/><path d="M415.0 289.8 l4 4 8-9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="439.0" y="293.8" font-size="12" fill="#1f7a45" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">安全</text><g transform="translate(380.0,207.9)"><text x="0.0" y="-12.0" font-size="10.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">整備</text><line x1="-21.0" y1="0.0" x2="14.0" y2="0.0" stroke="#bd9628" stroke-width="3"/><path d="M12 -6 L21 0 L12 6 Z" fill="#bd9628"/></g><text x="32.0" y="333.8" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会届の整備は保護者の権利を守るだけでなく、運営を担う役員自身を守る。</text><text x="32.0" y="363.2" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 民法522・703条／個人情報保護法</text></svg>