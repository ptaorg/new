<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 334" width="820" height="334" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="文科省「働き方改革」3分類とPTA事務の位置づけ"><rect x="1.0" y="1.0" width="818.0" height="332.1" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">教育委員会</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">文科省「働き方改革」3分類とPTA事務の位置づけ</text><line x1="32.0" y1="74.0" x2="788.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="106.0" width="756.0" height="40.0" rx="8" fill="#1e3a5f"/><text x="44.0" y="131.0" font-size="12.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">分類</text><text x="275.0" y="131.0" font-size="12.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">内容</text><text x="632.0" y="131.0" font-size="12.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTA事務は？</text><rect x="32.0" y="146.0" width="756.0" height="35.4" rx="0" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="168.0" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">① 学校以外が担うべき</text><text x="275.0" y="168.0" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">本来は学校・教師の業務ではないもの</text><text x="632.0" y="168.0" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">★ ここに該当</text><rect x="32.0" y="181.4" width="756.0" height="35.4" rx="0" fill="#faf8f2" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="203.4" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">② 学校の業務だが負担軽減</text><text x="275.0" y="203.4" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校の業務だが必ずしも教師が担わない</text><text x="632.0" y="203.4" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">—</text><rect x="32.0" y="216.8" width="756.0" height="35.4" rx="0" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="238.8" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">③ 教師が担うべき業務</text><text x="275.0" y="238.8" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">授業・生徒指導など</text><text x="632.0" y="238.8" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">—</text><line x1="263.0" y1="106.0" x2="263.0" y2="252.2" stroke="#e7e2d6" stroke-width="1"/><line x1="620.0" y1="106.0" x2="620.0" y2="252.2" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="106.0" width="756.0" height="146.2" rx="8" fill="none" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="274.2" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAの会計・集金・会員管理は「学校・教師が担うべき業務」ではない。働き方改革の趣旨からも教師から切り離すべき。</text><text x="32.0" y="303.6" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 中央教育審議会答申（2019）／文科省「学校における働き方改革」</text></svg>