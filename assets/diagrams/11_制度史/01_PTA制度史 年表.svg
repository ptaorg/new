<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 564" width="760" height="564" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="PTAの制度史――主要な転換点"><rect x="1.0" y="1.0" width="758.0" height="561.9" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">制度史</text><line x1="32.0" y1="49.0" x2="76.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTAの制度史――主要な転換点</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><line x1="120.0" y1="138.0" x2="120.0" y2="458.0" stroke="#bd9628" stroke-width="3"/><line x1="120.0" y1="114.0" x2="120.0" y2="114.0" stroke="#bd9628" stroke-width="3"/><rect x="154.0" y="114.0" width="574.0" height="48.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="170.0" y="138.0" font-size="13" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">戦後、CIE主導でPTAが急速に普及</text><text x="170.0" y="150.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">民主的な親子・地域づくりの場として</text><circle cx="120" cy="138.0" r="20" fill="#1e3a5f"/><text x="120.0" y="142.5" font-size="11" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">'47</text><rect x="154.0" y="178.0" width="574.0" height="48.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="170.0" y="202.0" font-size="13" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">社会教育法――PTAは社会教育関係団体に</text><text x="170.0" y="214.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校から独立した任意団体と位置づけ</text><circle cx="120" cy="202.0" r="20" fill="#1e3a5f"/><text x="120.0" y="206.5" font-size="11" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">'48</text><rect x="154.0" y="242.0" width="574.0" height="48.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="170.0" y="266.0" font-size="13" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「みなし加入」「全員加入」が慣習化</text><text x="170.0" y="278.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">本来の任意性が見えにくくなる</text><circle cx="120" cy="266.0" r="20" fill="#1e3a5f"/><text x="120.0" y="270.5" font-size="11" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">高度</text><rect x="154.0" y="306.0" width="574.0" height="48.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="170.0" y="330.0" font-size="13" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">学校給食費等の公会計化（文科省）</text><text x="170.0" y="342.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校徴収金と私費の分離が進む</text><circle cx="120" cy="330.0" r="20" fill="#1e3a5f"/><text x="120.0" y="334.5" font-size="11" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">'19</text><rect x="154.0" y="370.0" width="574.0" height="48.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="170.0" y="394.0" font-size="13" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">各地で入会届の必須化が進む</text><text x="170.0" y="406.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">任意加入の原則を行政が明確化</text><circle cx="120" cy="394.0" r="20" fill="#1e3a5f"/><text x="120.0" y="398.5" font-size="11" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">近年</text><rect x="154.0" y="434.0" width="574.0" height="48.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="170.0" y="458.0" font-size="13" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">横浜市が入会届を必須化（全市立校）</text><text x="170.0" y="470.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">任意性を行政が公式に支援</text><circle cx="120" cy="458.0" r="20" fill="#1e3a5f"/><text x="120.0" y="462.5" font-size="11" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">'26</text><text x="32.0" y="504.0" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">「新しい問題」ではなく、本来の姿（任意団体）への回帰。</text><text x="32.0" y="533.4" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： PTA適正化推進委員会 制度史</text></svg>