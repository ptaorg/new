<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">PTA会員情報が成立する順序</title>
  <desc id="desc">PTA説明、本人の加入意思、オプトイン型申込記録、PTA会員情報、会員資格、会費がある場合のみ会費負担へ進む流れ。</desc>
  <rect width="920" height="520" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1e3a5f"/>
    </marker>
  </defs>
  <g font-family="'Noto Sans JP', sans-serif">
    <rect x="230" y="30" width="460" height="54" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="460" y="64" text-anchor="middle" font-size="20" font-weight="900" fill="#0a192f">PTA説明</text>
    <line x1="460" y1="92" x2="460" y2="124" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="230" y="132" width="460" height="54" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="2"/>
    <text x="460" y="166" text-anchor="middle" font-size="20" font-weight="900" fill="#0a192f">本人の加入意思</text>
    <line x1="460" y1="194" x2="460" y2="226" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="230" y="234" width="460" height="54" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="460" y="268" text-anchor="middle" font-size="20" font-weight="900" fill="#0a192f">オプトイン型申込記録</text>
    <line x1="460" y1="296" x2="460" y2="328" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="230" y="336" width="460" height="54" rx="12" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
    <text x="460" y="370" text-anchor="middle" font-size="20" font-weight="900" fill="#0a192f">PTA会員情報</text>
    <line x1="460" y1="398" x2="460" y2="430" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="80" y="438" width="500" height="54" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="330" y="472" text-anchor="middle" font-size="18" font-weight="900" fill="#0a192f">連絡対象・議決権・役員資格・活動参加</text>
    <line x1="588" y1="465" x2="638" y2="465" stroke="#1e3a5f" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="646" y="438" width="194" height="54" rx="12" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <text x="743" y="461" text-anchor="middle" font-size="16" font-weight="900" fill="#0a192f">会費がある場合のみ</text>
    <text x="743" y="481" text-anchor="middle" font-size="16" font-weight="900" fill="#0a192f">会費負担</text>
  </g>
</svg>
