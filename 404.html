        'proper-management.html': true,
        'report.html': true,
        'shizuoka-incident.html': true,
        'support.html': true,
        'timeline.html': true
      };

      function normalizedPath(pathname) {
        var path = pathname || '/';
        try { path = decodeURI(path); } catch (e) {}
        path = path.replace(/\/index\.html$/i, '');
        if (path.length > 1) path = path.replace(/\/+$/g, '');
        return path.toLowerCase();
      }

      function destinationFor(pathname) {
        var key = normalizedPath(pathname);
        if (redirects[key]) return redirects[key];

        var extensionless = key.replace(/^\//, '') + '.html';
        if (/^[a-z0-9][a-z0-9\/-]*\.html$/.test(extensionless) && knownHtmlPages[extensionless]) {
          return '/' + extensionless;
        }
        return '';
      }

      var target = destinationFor(window.location.pathname);
      if (target) {
        if (window.gtag) {
          window.gtag('event', 'page_not_found_redirect', {
            original_path: window.location.pathname,
            redirect_to: target,
            referrer: document.referrer || ''
          });
        }
        window.setTimeout(function(){
          window.location.replace(target + window.location.search + window.location.hash);
        }, 250);
      } else if (window.gtag) {
        window.gtag('event', 'page_not_found', {
          page_path: window.location.pathname,
          page_location: window.location.href,
          referrer: document.referrer || ''
        });
      }
    })();
