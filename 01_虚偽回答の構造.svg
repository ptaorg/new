<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 322" width="820" height="322" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="「完全分離済」という回答が崩れるまで"><rect x="1.0" y="1.0" width="818.0" height="320.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">静岡市事案</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「完全分離済」という回答が崩れるまで</text><line x1="32.0" y1="74.0" x2="788.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="108.0" width="177.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="108.0" width="177.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="56.0" cy="138" r="14" fill="#1e3a5f"/><text x="56.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><text x="78.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">「完全分離済」と回答</text><text x="48.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">行政が照会に回答</text><g transform="translate(209.0,161.0)"><line x1="2.0" y1="0.0" x2="7.0" y2="0.0" stroke="#bd9628" stroke-width="2.5"/><path d="M5 -6 L14 0 L5 6 Z" fill="#bd9628"/></g><rect x="225.0" y="108.0" width="177.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="225.0" y="108.0" width="177.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="249.0" cy="138" r="14" fill="#1e3a5f"/><text x="249.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><text x="271.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">実際は継続</text><text x="241.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">分離されていなかった</text><g transform="translate(402.0,161.0)"><line x1="2.0" y1="0.0" x2="7.0" y2="0.0" stroke="#bd9628" stroke-width="2.5"/><path d="M5 -6 L14 0 L5 6 Z" fill="#bd9628"/></g><rect x="418.0" y="108.0" width="177.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="418.0" y="108.0" width="177.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="442.0" cy="138" r="14" fill="#1e3a5f"/><text x="442.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><text x="464.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">開示で判明</text><text x="434.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">公文書開示で食い違いが露見</text><g transform="translate(595.0,161.0)"><line x1="2.0" y1="0.0" x2="7.0" y2="0.0" stroke="#bd9628" stroke-width="2.5"/><path d="M5 -6 L14 0 L5 6 Z" fill="#bd9628"/></g><rect x="611.0" y="108.0" width="177.0" height="106.0" rx="12" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="611.0" y="108.0" width="177.0" height="4.0" rx="2" fill="#bd9628"/><circle cx="635.0" cy="138" r="14" fill="#1e3a5f"/><text x="635.0" y="143.0" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">4</text><text x="657.0" y="135.0" font-size="12.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">信頼性の問題</text><text x="627.0" y="162.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">行政回答そのものの信頼性が</text><text x="627.0" y="177.9" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">揺らぐ</text><rect x="32.0" y="228.0" width="756.0" height="36.0" rx="10" fill="#f3e8c4"/><text x="48.0" y="248.0" font-size="12" fill="#7a5d14" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">教育長は「法律と学校文化のずれ」を認めた。「破棄した」では解決しない。</text><text x="32.0" y="292.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 静岡市事案 関連資料／文科省 公式見解</text></svg>