name: Simplify support and evidence wording

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Replace rhetorical copy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          replacements = {
            'support.html': {
              'PTA問題は、単なる保護者間の感情論ではありません。入会意思の確認がないまま会員扱いされること、学校徴収金とPTA会費が一体化すること、学校が保有する児童・保護者情報がPTA運営に使われること、教職員が勤務時間中にPTA事務を担うことなど、学校手続と任意団体の境界が曖昧になるところに構造的な問題があります。':
              '入会意思の確認がないまま会員扱いされること、学校徴収金とPTA会費が一体化すること、学校が保有する児童・保護者情報がPTA運営に使われること、教職員が勤務時間中にPTA事務を担うことなど、学校手続と任意団体の境界に関する問題を調査しています。',
              'この構造を変えるには、実際の配布文書、教育委員会回答、公文書、法令、通知、会計資料を積み重ねて示す必要があります。そのための調査と公開を継続する費用が必要です。':
              '配布文書、教育委員会回答、公文書、法令、通知、会計資料の収集・整理・公開に費用がかかります。'
            },
            'evidence-checklist.html': {
              'PTA関連資料を受け取ったときは、内容の是非より先に、資料の主体・日付・対象・根拠・学校関与を確認します。研究、取材、照会、情報提供の初動で使うためのチェックリストです。':
              'PTA関連資料の主体、日付、対象、根拠、学校関与を確認するためのチェックリストです。',
              'まず確認すること': '基本情報',
              '資料を受け取った段階では、すぐに違法・適法を断定しません。最初に確認するのは、誰が作った資料か、誰に向けた資料か、どの年度・時点の資料か、学校がどの範囲で関与しているかです。PTA会長名の文書でも学校が配布・回収している場合、学校関与の論点が残ります。学校名の文書でも、実質的にPTAの入会・会費・名簿取得を促している場合、任意団体への加入手続きとの関係を確認する必要があります。':
              '作成主体、宛先、年度、作成日、配布・回収主体、学校関与の範囲を確認します。PTA会長名の文書を学校が配布・回収している場合や、学校名の文書がPTAの入会・会費・名簿取得を扱う場合は、学校とPTAの役割分担も確認します。',
              'チェックリストは、問題点を並べるためではなく、照会事項へ変換するために使います。たとえば「入会届が見当たらない」と分かった場合は、「入会届が存在しない」と断定する前に、学校又はPTAに対して、入会申込書、承諾記録、会員名簿、会費請求根拠の存在を確認します。':
              '確認結果を照会事項へ整理します。入会届が見当たらない場合は、学校又はPTAに対して、入会申込書、承諾記録、会員名簿、会費請求根拠の有無を確認します。',
              '慣例、前例、校長判断ではなく、どの規程・決裁・同意・委任に基づくのかを聞きます。':
              '根拠となる規程、決裁、同意、委任を確認します。',
              '<div class="ec-note"><strong>結論：</strong>資料の問題点を断定する前に、資料の主体、学校関与の有無、根拠文書の存否を確認します。提出文書にする場合は、断定ではなく「存在するか」「どの根拠か」「誰が判断したか」を問う形に落とします。</div>':
              '<div class="ec-note"><strong>確認事項：</strong>資料の主体、学校関与の有無、根拠文書の存否、判断主体を確認します。</div>'
            }
          }
          for filename, mapping in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              for old, new in mapping.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add support.html evidence-checklist.html
          if git diff --cached --quiet; then
            echo "No copy changes needed"
          else
            git commit -m "Simplify support and evidence page wording"
            git push origin main
          fi
