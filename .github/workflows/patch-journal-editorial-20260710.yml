name: Patch journal editorial 20260710

on:
  push:
    branches:
      - main
    paths:
      - scripts/patch_journal_editorial_20260710.py
      - .github/workflows/patch-journal-editorial-20260710.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply journal editorial patch
        run: python scripts/patch_journal_editorial_20260710.py

      - name: Verify changed file
        run: |
          set -e
          changed="$(git diff --name-only)"
          printf '%s\n' "$changed"
          test "$changed" = "journal.html"
          grep -q 'journal-prose-index-20260710' journal.html
          ! grep -q '<div class="page-hero-kicker">Journal</div>' journal.html

      - name: Commit journal redesign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add journal.html
          git commit -m "Convert journal index to prose-first list"
          git push origin main
