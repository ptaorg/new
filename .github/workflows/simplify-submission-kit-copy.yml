name: Simplify submission kit wording

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Simplify wording
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('submission-kit.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '学校、PTA、教育委員会へ確認文を出すための実務ページです。相手を責める文章ではなく、入会記録、会費徴収、個人情報、教職員関与、学校施設利用の担当主体と根拠資料を文書で確認します。':
            '学校、PTA、教育委員会へ提出する確認文、照会文、申入書を掲載しています。入会記録、会費徴収、個人情報、教職員関与、学校施設利用の担当主体と根拠資料を確認します。',
            '<a href="/claim-evidence-ledger.html">主張と根拠の対応表</a>': '<a href="/claim-evidence-ledger.html">根拠台帳</a>',
            '<h2>提出文は「抗議」ではなく「確認」にする</h2>': '<h2>提出文の構成</h2>',
            'PTA問題は、加入意思、会費、名簿、配布文書、学校施設、教職員の作業が一つに絡んで見えます。しかし提出文を一通に詰め込むと、相手方は「所掌外」「PTA内部の問題」「確認中」と答えやすくなります。':
            '加入意思、会費、名簿、配布文書、学校施設、教職員の作業を、提出先と論点ごとに分けます。',
            '先に提出先を分け、相手が答えられる資料名、作成主体、保管部署、根拠を聞きます。違法性の断定よりも、資料で確認できる事実を積み上げる方が、運用改善につながります。':
            '資料名、作成主体、保管部署、根拠、決裁、運用記録を具体的に記載して回答を求めます。',
            '個別案件の法的評価は、資料・時期・自治体の制度で変わります。このページは提出文の整理用であり、個別の法的助言や結論を保証するものではありません。':
            '個別案件では、対象資料、時期、自治体の制度を確認してください。'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add submission-kit.html
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Simplify submission kit wording"
            git push origin main
          fi
