name: Fix refine cache

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-refine-cache:
    if: contains(github.event.head_commit.message, 'Update refine cache workflow for privacy') || contains(github.event.head_commit.message, 'Run refine cache fix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update refine CSS cache keys
        run: |
          python - <<'PY'
          from pathlib import Path
          targets = [
              Path('guide-pta.html'),
              Path('guide-board.html'),
              Path('personnel.html'),
              Path('privacy.html'),
          ]
          for path in targets:
              text = path.read_text(encoding='utf-8')
              text = text.replace('css/refine.css?v=refine2', 'css/refine.css?v=hero-fix-20260629')
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          if git diff --quiet -- guide-pta.html guide-board.html personnel.html privacy.html; then
            echo "No cache key changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guide-pta.html guide-board.html personnel.html privacy.html
          git commit -m "Bump refine CSS cache for privacy page"
          git push
