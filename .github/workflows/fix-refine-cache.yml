name: Fix refine cache

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-refine-cache:
    if: contains(github.event.head_commit.message, 'Bump orange hero stylesheet cache') || contains(github.event.head_commit.message, 'Inject orange hover stylesheet') || contains(github.event.head_commit.message, 'Apply orange hover styles') || contains(github.event.head_commit.message, 'Remove redundant intro blocks') || contains(github.event.head_commit.message, 'Remove compliance reading guide') || contains(github.event.head_commit.message, 'Run sitewide refine cache fix') || contains(github.event.head_commit.message, 'Run refine cache fix')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update orange hero stylesheet cache key
        run: |
          python - <<'PY'
          from pathlib import Path
          exclude_dirs = {'.git', 'node_modules', 'docs', 'scripts', 'tools', 'tests', 'source-candidates'}
          hover_link = '<link rel="stylesheet" href="css/hover-orange.css?v=20260629-hero2">'
          old_hover_keys = [
              'css/hover-orange.css?v=20260629',
              'css/hover-orange.css?v=20260629-hero',
              'css/hover-orange.css?v=20260629-hero2',
          ]
          changed = []
          for path in Path('.').rglob('*.html'):
              if any(part in exclude_dirs for part in path.parts):
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              if 'css/hover-orange.css' in text:
                  for key in old_hover_keys:
                      text = text.replace(key, 'css/hover-orange.css?v=20260629-hero2')
              else:
                  if '</head>' not in text:
                      continue
                  text = text.replace('</head>', hover_link + '\n</head>', 1)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))
          print('changed files:')
          for item in changed:
              print(item)
          PY

      - name: Commit changes
        run: |
          if git diff --quiet -- '*.html'; then
            echo "No HTML changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          git commit -m "Bump orange hero stylesheet cache"
          git push
