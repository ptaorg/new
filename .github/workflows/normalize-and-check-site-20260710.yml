name: Normalize and check site 20260710

on:
  push:
    paths:
      - '.github/workflows/normalize-and-check-site-20260710.yml'

permissions:
  contents: write

jobs:
  normalize-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Normalize index site.js version
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          old = 'js/site.js?v=91'
          new = 'js/site.js?v=90'
          if old not in text:
              raise SystemExit('expected v91 reference not found')
          p.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Run site checks and capture report
        shell: bash
        run: |
          set +e
          npm test > site-check-report-20260710.txt 2>&1
          status=$?
          echo >> site-check-report-20260710.txt
          echo "EXIT_STATUS=$status" >> site-check-report-20260710.txt
          cat site-check-report-20260710.txt
          exit 0
      - name: Commit normalized file and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html site-check-report-20260710.txt
          git diff --cached --quiet && exit 0
          git commit -m "Normalize site.js version and record site checks"
          git push
