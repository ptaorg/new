name: Export checked editorial CSS

on:
  pull_request:
    branches:
      - main

jobs:
  export:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'editorial-open-layout-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: editorial-open-layout-20260717
      - uses: actions/upload-artifact@v4
        with:
          name: editorial-open-final-css
          path: css/refine.css
