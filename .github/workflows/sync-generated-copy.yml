name: Sync generated indexes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Generate search and sitemap
        run: |
          npm run generate:search
          npm run generate:sitemap
          npm test
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add data/site-search-index.js sitemap.xml
          if git diff --cached --quiet; then
            echo "Generated files already current"
          else
            git commit -m "Sync search index after wording updates"
            git push origin main
          fi
