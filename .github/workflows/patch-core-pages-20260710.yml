name: Patch core pages 20260710

on:
  push:
    branches:
      - main
    paths:
      - scripts/patch_core_pages_20260710.py
      - .github/workflows/patch-core-pages-20260710.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply targeted replacements
        run: python scripts/patch_core_pages_20260710.py

      - name: Verify changed files
        run: |
          set -e
          changed="$(git diff --name-only)"
          printf '%s\n' "$changed"
          test "$changed" = $'guide-parent.html\nmembership.html\nprivacy.html'
          ! grep -q '直ちに契約が無効になるとは限らず' membership.html
          ! grep -q '個人情報保護法 第69条違反' privacy.html
          ! grep -q 'PTAは100%任意加入です' guide-parent.html
          ! grep -q '学校の事務室経由での提出も可能です' guide-parent.html

      - name: Commit core page corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add membership.html privacy.html guide-parent.html
          git commit -m "Unify core PTA legal explanations"
          git push origin main
