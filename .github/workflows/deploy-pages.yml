name: Deploy new-site preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build /new/ preview
        run: node scripts/build-new-preview.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify renewed donation page
        run: |
          for attempt in $(seq 1 24); do
            if curl --fail --silent --location "https://ptaorg.com/new/support.html?commit=${GITHUB_SHA}&attempt=${attempt}" | grep --fixed-strings --quiet 'support-payment-section'; then
              exit 0
            fi
            sleep 5
          done
          echo 'Renewed donation page was not found at /new/support.html' >&2
          exit 1
