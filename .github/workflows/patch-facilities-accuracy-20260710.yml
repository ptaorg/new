name: Patch facilities accuracy 20260710

on:
  push:
    paths:
      - 'scripts/patch-facilities-accuracy-20260710.py'
      - '.github/workflows/patch-facilities-accuracy-20260710.yml'
      - '.github/facilities-accuracy-trigger-20260710'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply facilities accuracy patch
        run: python scripts/patch-facilities-accuracy-20260710.py
      - name: Run site checks
        run: npm test
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add facilities.html
          git diff --cached --quiet && exit 0
          git commit -m "Clarify school facility permission and public-private boundaries"
          git push
