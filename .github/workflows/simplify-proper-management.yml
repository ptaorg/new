name: Simplify proper management page

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-proper-management:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Remove denial framing
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('proper-management.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            'PTA適正化とは、PTAをなくすことではなく、任意加入、公私分離、個人情報保護、会費徴収分離、学校施設利用、教職員関与を法令に沿って整理することです。':
            'PTA適正化の基本となる任意加入、公私分離、個人情報保護、会費徴収分離、学校施設利用、教職員関与を整理します。',
            'PTAをなくすことではなく、任意団体として続けられるよう、学校との線引き、会費、個人情報、施設利用、教職員関与を法令に沿って整えるための基本ページです。':
            '任意団体としてのPTA運営と、学校との役割分担、会費、個人情報、施設利用、教職員関与を整理します。',
            '学校とPTAの関係をあいまいにしたままでは、入会意思、会費徴収、個人情報、教職員関与、学校施設利用の根拠が見えなくなります。適正化は、任意団体としての手続と学校の公的手続を分け、責任の所在を明確にすることです。':
            '任意団体としての手続と学校の公的手続を分け、入会意思、会費徴収、個人情報、教職員関与、学校施設利用の責任主体を明確にします。',
            'PTAは、保護者と教職員が任意に支え合う団体です。しかし、入学手続、学校徴収金、学校連絡ツール、児童経由配布、学校名簿、教職員の勤務時間内事務と結びつくと、保護者からは「学校の手続」と区別しにくくなります。ここに、強制加入、会費の抱き合わせ徴収、個人情報の目的外利用、先生への過重負担が生じます。':
            'PTAは、保護者と教職員が任意に参加する団体です。入学手続、学校徴収金、学校連絡ツール、児童経由配布、学校名簿、教職員の勤務時間内事務との関係を明確にする必要があります。',
            'したがって、適正化の中心は、PTA活動の中身を行政が決めることではありません。学校がPTAのために行っている配布、回収、徴収、名簿利用、連絡、施設利用、教職員関与を点検し、任意団体として説明できる運営へ戻すことです。':
            '学校がPTAのために行う配布、回収、徴収、名簿利用、連絡、施設利用、教職員関与を点検し、PTA自身が運営を説明できる状態にします。',
            'PTAを支配するのではなく、学校がPTAのために行う関与の範囲と条件を明文化し、校長任せにしない。':
            '学校がPTAのために行う関与の範囲と条件を明文化し、学校ごとの判断だけに委ねない。',
            '<h2>ここから先の資料</h2>': '<h2>関連資料</h2>',
            '<p>このページは「適正化とは何か」という考え方の整理です。次に進む先は、実務手順、教育委員会向け資料、根拠資料の3つに絞ります。</p>':
            '<p>実務手順、教育委員会向け資料、根拠資料を掲載しています。</p>'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          text = re.sub(
              r'<section class="pm-section" id="not-meaning">.*?</section>\s*(?=<section class="pm-section" id="process">)',
              '',
              text,
              flags=re.S
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add proper-management.html
          if git diff --cached --quiet; then
            echo "No proper management changes needed"
          else
            git commit -m "Remove denial framing from proper management page"
            git push origin main
          fi
