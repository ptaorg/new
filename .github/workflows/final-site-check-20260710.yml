name: Final site check 20260710

on:
  push:
    paths:
      - '.github/workflows/final-site-check-20260710.yml'
      - '.github/final-site-check-trigger-20260710'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run complete site tests
        shell: bash
        run: |
          set +e
          npm test > final-site-check-report-20260710.txt 2>&1
          status=$?
          echo >> final-site-check-report-20260710.txt
          echo "EXIT_STATUS=$status" >> final-site-check-report-20260710.txt
          cat final-site-check-report-20260710.txt
          exit 0
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add final-site-check-report-20260710.txt
          git commit -m "Record final site checks"
          git push
