name: Site checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Correct guidebook table of contents
        run: python tools/fix-guidebook-toc-20260710.py

      - name: Install dependencies if package metadata is present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping dependency install."
          fi

      - name: Regenerate generated files
        run: |
          npm run generate:sitemap
          npm run generate:search

      - name: Run all checks
        run: npm run check:all

      - name: Commit guidebook and generated files
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'PTA運営適正化ガイドブック_第4版_改訂本文.html' sitemap.xml data/site-search-index.js
          if git diff --cached --quiet; then
            echo "No guidebook or generated-file changes"
          else
            git commit -m "Synchronize guidebook contents and generated indexes"
            git push
          fi
