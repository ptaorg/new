name: Site checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refine shared navigation
        run: python tools/refine-site-js-navigation-20260710.py

      - name: Install dependencies if package metadata is present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping dependency install."
          fi

      - name: Run site checks
        run: npm test

      - name: Commit shared navigation
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add js/site.js
          if git diff --cached --quiet; then
            echo "No shared navigation changes"
          else
            git commit -m "Remove automatic hub injection and simplify shared navigation"
            git push
          fi
