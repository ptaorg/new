name: Site checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply board responses layout patch
        run: python tools/patch-board-responses-editorial-20260710.py

      - name: Install dependencies if package metadata is present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping dependency install."
          fi

      - name: Run site checks
        run: npm test

      - name: Commit board responses layout
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add board-responses.html
          if git diff --cached --quiet; then
            echo "No board responses changes"
          else
            git commit -m "Convert board responses to editorial document layout"
            git push
          fi
