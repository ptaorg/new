name: Patch fee collection accuracy 20260710

on:
  push:
    paths:
      - 'scripts/patch-fee-collection-accuracy-20260710.py'
      - 'scripts/patch-fee-collection-mext-2025-20260710.py'
      - '.github/workflows/patch-fee-collection-accuracy-20260710.yml'
      - '.github/fee-collection-accuracy-trigger-20260710'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply fee collection accuracy patch
        run: python scripts/patch-fee-collection-accuracy-20260710.py
      - name: Emphasize the 2025 school fee notice
        run: python scripts/patch-fee-collection-mext-2025-20260710.py
      - name: Run site checks
        run: npm test
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fee-collection.html
          git diff --cached --quiet && exit 0
          git commit -m "Refocus fee collection page on school authority and 2025 notice"
          git push
