name: Patch PTA officer guide editorial 20260710

on:
  push:
    paths:
      - 'scripts/patch-guide-pta-editorial-20260710.py'
      - '.github/workflows/patch-guide-pta-editorial-20260710.yml'
      - '.github/guide-pta-editorial-trigger-20260710'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply editorial patch
        run: python scripts/patch-guide-pta-editorial-20260710.py
      - name: Run site checks
        run: npm test
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guide-pta.html
          git diff --cached --quiet && exit 0
          git commit -m "Convert PTA officer guide to continuous editorial reading"
          git push
