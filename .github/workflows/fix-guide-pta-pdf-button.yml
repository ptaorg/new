name: Fix guide PTA PDF button

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-guide-pta-pdf-button:
    if: contains(github.event.head_commit.message, 'Fix guide PTA PDF button')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace guide PTA PDF button
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('guide-pta.html')
          text = path.read_text(encoding='utf-8')
          original = text
          old = '<a class="btn-soft" href="PTA運営適正化ガイドブック_第4版_改訂本文.html">原文PDFの確認へ</a>'
          new = '<a class="btn-soft" href="PTA運営適正化ガイドブック_第4版_改訂版.pdf" download>PDFダウンロード</a>'
          if old not in text:
              raise SystemExit('target button not found')
          text = text.replace(old, new, 1)
          if text != original:
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          if git diff --quiet -- guide-pta.html; then
            echo "No guide-pta.html changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guide-pta.html
          git commit -m "Fix guide PTA PDF button"
          git push
