name: Run editorial open layout PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-check:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'editorial-open-layout-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: editorial-open-layout-20260717
          fetch-depth: 0

      - name: Extract and append reviewed CSS
        shell: bash
        run: |
          set -euo pipefail
          awk "/cat >> css\/refine.css <<'CSS'/{flag=1;next} /^CSS$/{flag=0} flag" .github/workflows/apply-editorial-open-layout.yml > /tmp/editorial-open.css
          grep -q 'OPEN EDITORIAL LAYOUT 20260717' /tmp/editorial-open.css
          if grep -q 'OPEN EDITORIAL LAYOUT 20260717' css/refine.css; then
            echo 'Marker already present; refusing duplicate append.' >&2
            exit 1
          fi
          cat /tmp/editorial-open.css >> css/refine.css

      - name: Run repository checks
        run: npm test

      - name: Install Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Browser-check revised pages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p editorial-open-audit
          python3 -m http.server 4173 >/tmp/editorial-open-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" || true' EXIT
          sleep 2
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const files = ['personnel.html','facilities.html','fee-collection.html'];
          const viewports = [{name:'desktop',width:1440,height:1000},{name:'mobile',width:390,height:844}];
          const browser = await chromium.launch({headless:true});
          const results=[];
          let failed=false;
          for (const viewport of viewports) {
            const context=await browser.newContext({viewport,locale:'ja-JP',colorScheme:'light'});
            for (const file of files) {
              const page=await context.newPage();
              const response=await page.goto(`http://127.0.0.1:4173/${file}`,{waitUntil:'networkidle',timeout:30000});
              const metrics=await page.evaluate(()=>{
                const visible=(el)=>{const s=getComputedStyle(el),r=el.getBoundingClientRect();return s.display!=='none'&&s.visibility!=='hidden'&&r.width>0&&r.height>0;};
                const selectors='.editorial-brief,.editorial-panel,.scope-ok,.scope-ng,.safe-box,.wall,.triple-card,.trans-card,.req-step,.alert,.alert-block,.law-quote,.law-quote-block,.mext-quote,.source-lens-item,.faq-item';
                const items=[...document.querySelectorAll(selectors)].filter(visible).map(el=>{const s=getComputedStyle(el);return{radius:parseFloat(s.borderTopLeftRadius)||0,shadow:s.boxShadow};});
                const main=document.querySelector('.pg-main,.pg,.issue-content');
                return{clientWidth:document.documentElement.clientWidth,scrollWidth:document.documentElement.scrollWidth,h1Count:[...document.querySelectorAll('h1')].filter(visible).length,mainWidth:main?Math.round(main.getBoundingClientRect().width):0,rounded:items.filter(x=>x.radius>4).length,shadowed:items.filter(x=>x.shadow!=='none').length};
              });
              const problems=[];
              if(!response||response.status()>=400)problems.push(`HTTP ${response?response.status():'none'}`);
              if(metrics.scrollWidth>metrics.clientWidth+2)problems.push(`horizontal overflow ${metrics.scrollWidth}>${metrics.clientWidth}`);
              if(metrics.h1Count!==1)problems.push(`h1 count ${metrics.h1Count}`);
              if(viewport.name==='desktop'&&metrics.mainWidth<850)problems.push(`main too narrow ${metrics.mainWidth}`);
              if(metrics.rounded)problems.push(`rounded cards ${metrics.rounded}`);
              if(metrics.shadowed)problems.push(`shadow cards ${metrics.shadowed}`);
              if(problems.length)failed=true;
              const screenshot=`editorial-open-audit/${viewport.name}__${file.replace('.html','')}.png`;
              await page.screenshot({path:screenshot,fullPage:true});
              results.push({file,viewport:viewport.name,...metrics,problems,screenshot});
              await page.close();
            }
            await context.close();
          }
          await browser.close();
          fs.writeFileSync('editorial-open-audit/results.json',JSON.stringify(results,null,2));
          console.log(JSON.stringify(results,null,2));
          if(failed)process.exit(1);
          NODE

      - uses: actions/upload-artifact@v4
        with:
          name: editorial-open-layout-screenshots
          path: editorial-open-audit

      - name: Commit checked CSS
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add css/refine.css
          git commit -m 'Open card-heavy issue pages into editorial layout'
          git push origin HEAD:editorial-open-layout-20260717
