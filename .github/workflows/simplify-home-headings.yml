name: Simplify home section headings

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-home:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Replace explanatory headings
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '問題は、PTAがあることではなく、学校手続に溶け込んで見えなくなることです': '学校とPTAの境界',
            '制度上の説明だけでは、各学校で何が行われているかは分かりません。教育委員会の回答、学校文書、PTA文書、会計資料を突き合わせ、説明と実態が一致しているかを確認します。': '教育委員会の回答、学校文書、PTA文書、会計資料を掲載しています。',
            '資料を読むときの基本': '確認事項',
            '「PTAは任意団体です」という一般論だけで終わらせず、入会申込書はあるか、会費の請求主体は誰か、学校情報を誰が何のために使ったか、教職員の事務は校務として特定されているか、施設利用の許可条件は何かを、具体的な文書名で確認します。': '入会申込書、会費の請求主体、学校情報の利用目的、教職員事務の位置付け、施設利用の許可条件を確認します。',
            '確認した内容を、記録と照会へつなげる': '記録・照会',
            '問題を指摘するだけでなく、本人の意思を記録し、学校・PTA・教育委員会へ確認すべき事項を文書にします。以下は本文を読んだ後に使う補助資料です。': '非入会通知書、退会届、教育委員会宛て照会書、運営チェック、証拠整理表、提出文例を掲載しています。',
            '中核資料として、': '関連資料：',
            '立場別ページは、本文を読んだ後の補助導線です': '立場別',
            '同じ問題でも、確認する文書と行動は立場によって異なります。入口を細分化しすぎず、必要なページだけを案内します。': '保護者、PTA役員、教育委員会・学校、研究者・記者向けの確認事項です。',
            '現場で起きていることを、映像と文書で確認する': '映像資料',
            'PTAの強制加入・強制活動と受け止められている事例を記録した映像です。「みんなやっているから」という説明だけで済ませず、関連する書類や運用とともに確認します。': 'PTAの強制加入・強制活動と受け止められている事例を記録した映像です。'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No home copy changes needed"
          else
            git commit -m "Simplify home page section headings"
            git push origin main
          fi
