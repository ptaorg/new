name: Patch documents index editorial 20260710

on:
  push:
    paths:
      - 'scripts/patch-documents-editorial-20260710.py'
      - '.github/workflows/patch-documents-editorial-20260710.yml'
      - '.github/documents-editorial-trigger-20260710'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply editorial patch
        run: python scripts/patch-documents-editorial-20260710.py
      - name: Run site checks
        run: npm test
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add documents.html
          git diff --cached --quiet && exit 0
          git commit -m "Convert documents cards to a direct document register"
          git push
