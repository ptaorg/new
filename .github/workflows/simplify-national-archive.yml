name: Simplify national archive labels

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Simplify archive wording
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('national-archive.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '自治体・学校ごとのPTA入会案内、入会申込書、学校徴収金案内、会費徴収資料、個人情報同意書などの実物文書を、自治体ごとに整理するページです。厚木市は一つの事例であり、その下に他自治体の資料ブロックが続きます。':
            '自治体・学校ごとのPTA入会案内、入会申込書、学校徴収金案内、会費徴収資料、個人情報同意書などを掲載しています。',
            '地図上のピンから各自治体の資料へ移動できます。地図が表示されない場合は、下の自治体別資料から確認できます。':
            '地図上のピンから自治体別資料へ移動できます。',
            '自治体名を開くと、学校別資料、確認済み資料、原本フォルダを確認できます。':
            '学校別資料、確認済み資料、原本フォルダを掲載しています。',
            "x[5]==='watch'?'要確認':'最低評価'": "x[5]==='watch'?'要確認':'申込書確認なし'",
            '<div class="city-visible"><div class="kicker">ATSUGI CITY</div><h2 class="title">神奈川県厚木市 PTA関連資料・学校別評価</h2><p class="lead">厚木市欄は、PTAが存在する学校で入会申込書が確認できるかを基準に整理します。PTA自体が存在しない学校を除き、開示請求で入会申込書が送付されなかった学校は、入会申込書不存在として扱います。</p></div>':
            '<div class="city-visible"><h2 class="title">神奈川県厚木市 PTA関連資料</h2><p class="lead">厚木市に対する開示請求で、入会申込書が送付されたかを学校別に整理しています。</p></div>',
            '<summary>厚木市の評価詳細・学校別カードを開く</summary>': '<summary>厚木市の学校別資料</summary>',
            '<div class="notice"><strong>今回の評価前提。</strong>この調査では、厚木市に対して入会申込書等の開示請求を行い、送付された資料を確認しています。資料がない学校は、単なる未確認ではありません。入会申込書を求めた開示請求に対して、入会申込書が送付されなかった学校です。PTA自体が存在しない場合を除き、入会申込書不存在として扱います。</div>':
            '<div class="notice"><strong>資料の確認状況</strong>厚木市に対して入会申込書等の開示請求を行い、送付された資料を学校別に確認しています。PTA自体が存在しない場合を除き、入会申込書が送付されなかった学校は「申込書確認なし」と表示しています。</div>',
            '<div class="notice"><strong>PTAがあるのに入会申込書がないことの重大性。</strong>PTAが存在するのに入会申込書がないまま会員扱いし、会費を請求し、個人情報を利用し、役員選出の対象にすることは、会員資格、会費請求、個人情報利用、役員選出の根拠を欠く重大問題です。</div>':
            '<div class="notice"><strong>入会申込書が確認できない場合</strong>会員資格、会費請求、個人情報利用、役員選出の根拠となる記録を確認する必要があります。</div>',
            '<div class="stat red"><strong>35校</strong><span>最低評価</span></div>': '<div class="stat red"><strong>35校</strong><span>申込書確認なし</span></div>',
            '<div class="inquiry-box"><div class="kicker">INQUIRY POINTS</div><h2 class="title">厚木市教育委員会に確認すべき事項</h2>':
            '<div class="inquiry-box"><h2 class="title">厚木市教育委員会への確認事項</h2>',
            '学校別カード化前の資料': '学校別整理前の資料',
            '学校別の本文評価は順次作成します。現時点では原本資料フォルダから学校別PDF・資料を確認してください。':
            '学校別の整理は順次追加します。原本資料フォルダから学校別PDF・資料を確認できます。',
            'return `<div class="city-visible"><div class="kicker">${esc(c.label)}</div><h2 class="title">${esc(c.name)} PTA関連資料</h2>':
            'return `<div class="city-visible"><h2 class="title">${esc(c.name)} PTA関連資料</h2>'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add national-archive.html
          if git diff --cached --quiet; then
            echo "No archive changes needed"
          else
            git commit -m "Simplify national archive labels"
            git push origin main
          fi
