name: Simplify education board pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Simplify education board wording
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          # Education-board separation guide
          path = Path('edu-board-separation.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '学校とPTAの線引きを校長任せにせず、教育委員会が役割分担と学校関与の限界を明文化するための実務整理です。':
            '教育委員会が、学校とPTAの役割分担、入会、会費、個人情報、教職員関与、施設利用の基準を整理する実務指針です。',
            '<div class="page-hero-kicker">教育委員会向けガイド / 実務編</div>': '<div class="page-hero-kicker">教育委員会向け実務指針</div>',
            '<h1>学校とPTAの線引きを、<br/><em>校長任せにしない。</em></h1>': '<h1>学校とPTAの<br/><em>役割分担</em></h1>',
            '<p>教育委員会が、校長・学校を守るために「学校とPTAの役割分担」を明文化するための実務整理です。</p>': '<p>学校が担う事務と、PTAが自ら担う団体運営を整理します。</p>',
            '<h2>1. 教育委員会の方へ</h2>': '<h2>1. 教育委員会の役割</h2>',
            '教育委員会が出すべきものは、PTAへの委任を整える通知ではなく、学校がPTA内部事務を抱え込まないための分離通知です。': '教育委員会は、学校がPTA内部事務を抱え込まないための基準を示します。',
            '<p>このページは、教育委員会が各学校へ「ここまでは学校、ここからはPTA」と明確に示すための実務整理です。</p>': '',
            '<p>PTAを否定するためのページではありません。校長・教職員が、PTA会費徴収、入会管理、役員選出を学校業務として抱え込まないようにするための援護射撃として使うページです。</p>': '',
            '<h3>なぜ校長任せでは解決しないのか</h3>': '<h3>自治体共通基準の必要性</h3>',
            '教育委員会通知は、校長を縛るための文書ではありません。校長が一人でPTA役員や保護者と対立しないようにするための、教育委員会からの援護射撃です。教育委員会が基準を出せば、校長は「本校だけの判断ではなく、教育委員会の方針です」と説明できます。学校ごとの交渉にせず、自治体としての共通基準にすることが、現場を守る第一歩です。':
            '教育委員会が自治体共通の基準を示せば、校長は学校ごとの個別判断ではなく、教育委員会の方針として説明できます。',
            '<h2>2. このページの目的</h2>': '<h2>2. 目的</h2>',
            '<p>目的はPTAを排除することではありません。PTAを学校の内部組織のように扱う慣行を整理し、PTAを任意団体として自立させることです。</p>': '<p>PTAを学校の内部組織のように扱う慣行を整理し、学校とPTAの責任範囲を明確にします。</p>',
            '<p>学校が抱え込むべきでない事務を明確にすることは、PTA活動を弱めるためではなく、学校とPTAの責任をそれぞれ本来の位置に戻すための整理です。</p>': '<p>学校が担う事務と、PTAが自ら担う団体運営を明確にします。</p>',
            '<h3>PTAを否定するのではなく、自立させる</h3>': '<h3>PTA自身による団体運営</h3>',
            '<p>学校とPTAを分離するという言葉は、PTAを学校から排除する意味に受け止められることがあります。しかし、このページが示す分離は、PTA活動の否定ではありません。むしろ、PTAを任意団体として正面から扱い、保護者に対して説明責任を果たせる団体に戻すための整理です。</p>': '',
            'PTAが自ら入会案内を行い、自ら入会申込を受け、自ら会費を請求・収納し、自ら会員管理を行うことは、PTAを弱めるものではありません。むしろ、PTAが任意団体として活動していることを明確にし、加入者の意思に基づく団体であるという正当性を高めます。教育委員会が示すべき方向は、PTAを学校から遠ざけることではなく、PTAの自主性と学校の責任範囲を同時に明確にすることです。':
            'PTAが入会案内、入会申込、会費請求・収納、会員管理を自ら行うことで、加入者の意思に基づく団体運営と学校の責任範囲が明確になります。',
            '<h3>正式な委任では足りない理由</h3>': '<h3>委任がある場合の確認事項</h3>',
            '<p>見直しの場面では、「PTAから学校へ正式な委任書を出せばよい」「覚書を整えればよい」という整理が提案されることがあります。しかし、委任を整える方向に進むと、学校がPTA会費徴収や会員管理を継続することになり、学校とPTAの混同を温存します。</p>': '<p>PTAから学校への委任書や覚書があっても、学校側の事務権限、校務、服務、個人情報、会計処理の根拠は別に確認する必要があります。</p>',
            '<p>問題の中心は、委任書の有無だけではありません。保護者から見て、PTA会費が学校徴収金の一部に見えること、PTA入会が学校手続の一部に見えること、PTA会員情報を学校が管理しているように見えること自体が、任意団体としてのPTAの外観を曖昧にします。委任を制度化すると、学校がPTA内部事務を担い続ける仕組みが固定化され、校長・教職員が責任主体として巻き込まれる状態も残ります。</p>': '<p>学校が関与する場合は、入会意思、会費債務、口座情報の利用、校務・服務上の位置付け、決裁、会計区分、保護者への説明を確認します。</p>',
            '<p>このページの基本方針は、委任による学校関与の制度化ではなく、PTA入会、会費徴収、会員管理をPTA自身へ戻すことです。移行期間中に暫定措置が必要な場合でも、最終目標はPTA直接徴収・直接管理です。教育委員会通知は、学校がPTA事務を受任するための通知ではなく、学校がPTA内部事務を抱え込まないための分離通知として設計する必要があります。</p>': '<p>恒常的な入会受付、会員管理、会費請求・収納はPTAが直接行う構成を基本とし、学校が関与する範囲と条件は教育委員会通知で明文化します。</p>',
            '<h2>3. 基本線：学校は学校教育、PTAは任意団体運営</h2>': '<h2>3. 役割分担</h2>',
            '<p>基本線は単純です。学校・教育委員会は学校教育と学校運営の範囲を担い、PTAは任意団体としての団体運営を自ら担います。</p>': '<p>学校・教育委員会は学校教育と学校運営を担い、PTAは会員管理、会費、役員選出、会計、広報等の団体運営を担います。</p>',
            'aria-label="一体化（公私混同）から、完全分離へ"': 'aria-label="一体化した運用から役割分担へ"',
            '一体化（公私混同）から、<em>完全分離</em>へ': '一体化した運用から、<em>役割分担</em>へ',
            '✓ 適正化 ― 完全分離': '役割分担',
            '左：申込書が無く、学校とPTAの名簿・会費・事務が一体化。右：申込書で会員を直接把握し、会計・情報・人を切り分ける。': '学校とPTAの会員情報、会費、事務、責任主体を分けて整理します。',
            '<h2>4. 教育委員会通知で「学校は行わない」と明記すべき事項</h2>': '<h2>4. 教育委員会通知に明記する事項</h2>',
            '教育委員会通知で重要なのは、PTAに対して「こうしなさい」と直接命令することではありません。教育委員会が示すべき中心は、学校側の業務範囲です。': '教育委員会通知の中心は、学校側の業務範囲です。'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          text = re.sub(r'<div class="hero-actions">.*?</div>', '', text, count=1, flags=re.S)
          text = re.sub(r'<aside aria-label="ページ内目次" class="edu-toc">.*?</aside>', '', text, count=1, flags=re.S)
          text = re.sub(r'<section class="edu-section" id="jp-distribution-bridge">.*?</section>', '', text, count=1, flags=re.S)
          text = re.sub(r'<section class="edu-section" id="responsibility-essay-bridge">.*?</section>', '', text, count=1, flags=re.S)
          path.write_text(text, encoding='utf-8')

          # Education-board responsibility essay
          path = Path('education-board-responsibility.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            'PTA内部運営ではなく、学校が関与する入会案内、会費徴収、個人情報、教職員関与、施設利用を教育委員会が点検すべき理由を整理します。': '学校が関与する入会案内、会費徴収、個人情報、教職員関与、施設利用と、教育委員会の確認責任を整理します。',
            'PTA問題はなぜ教育委員会の所掌なのか｜PTA適正化推進委員会': '学校のPTA関与と教育委員会の確認責任｜PTA適正化推進委員会',
            '<div class="page-hero-kicker">Education Board Responsibility</div>': '<div class="page-hero-kicker">教育委員会の確認責任</div>',
            '<h1>PTA問題は、なぜ<br/><em>教育委員会の所掌</em>なのか</h1>': '<h1>学校のPTA関与と<br/><em>教育委員会の確認責任</em></h1>',
            '<p>任意団体の自主性を尊重しながら、学校が関与している部分をどう点検するか。公私分離を、教育行政の実務として整理します。</p>': '<p>学校がPTAのために行う配布、回収、徴収、情報利用、教職員事務、施設利用を整理します。</p>',
            '<h2>PTA内部ではなく、学校が関与している部分を見る</h2>': '<h2>確認対象</h2>',
            '<p>PTAは、学校とは別の任意団体です。したがって、教育委員会がPTAの役員選出、活動方針、会則運用を直接支配することはできません。この前提は崩してはなりません。</p>': '<p>PTA内部の役員選出、活動方針、会則運用はPTAの自治に委ねられます。</p>',
            '<p>しかし、PTAの入会案内が学校説明会で配られ、担任や学校事務が書類を回収し、学校徴収金と同じ口座や通知でPTA会費が扱われ、学校が保有する児童・保護者情報や学校連絡ツールがPTA運営に使われているなら、そこには学校の行為が含まれます。教育委員会が確認すべきなのは、PTAそのものではなく、学校がPTAにどこまで協力し、どの根拠で公的資源を使わせているのかです。</p>': '<p>教育委員会は、学校説明会での入会案内、書類回収、会費徴収、学校保有情報、学校連絡ツール、教職員事務、施設利用について、学校の関与範囲と根拠を確認します。</p>',
            '<div class="editorial-bluebar">PTAを否定するためではなく、PTAを任意団体として正面から扱うために、学校との境界を明確にする。</div>': '',
            '<h2>本稿の中心命題</h2>': '<h2>教育委員会が確認する事項</h2>',
            '<p>教育委員会が「PTAは任意団体なので関与しない」とだけ答えると、学校側が実際に担っている配布、回収、集金、名簿、連絡、施設利用、教職員の事務従事が見えなくなります。社会教育法第12条が守ろうとしているのは、社会教育関係団体の自主性であって、学校が任意団体の内部事務を抱え込む慣行ではありません。</p>': '<p>PTAが任意団体であることと、学校がPTAのために行う配布、回収、集金、名簿、連絡、施設利用、教職員事務を確認することは別の問題です。</p>',
            '<p>むしろ、PTAが学校の文書、学校の口座、学校の名簿、学校連絡ツール、教職員の勤務時間、学校施設に依存して運営されている場合、教育委員会は学校管理、服務、個人情報保護、施設管理の問題として、その関与範囲を確認する必要があります。</p>': '<p>教育委員会は、学校管理、服務、個人情報保護、会計、施設管理の観点から、学校の関与範囲を確認します。</p>',
            '<strong>見るべき対象は「PTAの思想や活動内容」ではなく、「学校がPTAのために行っている行為」です。</strong>': '<strong>確認対象は、学校がPTAのために行っている行為です。</strong>',
            '<p>この切り分けを行えば、任意団体の自主性を侵害せずに、学校とPTAの公私分離を進めることができます。</p>': '<p>PTA内部の自治と、学校管理上の確認事項を分けます。</p>',
            '<div class="section-kicker">5つの学校関与</div>': '',
            '<p class="section-lead">PTA問題は、単一の条文で片づくものではありません。入会、会費、個人情報、教職員関与、施設利用が互いに連動しているため、学校が関与した行為を領域別に分けて確認する必要があります。</p>': '<p class="section-lead">入会、会費、個人情報、教職員関与、施設利用を領域別に確認します。</p>',
            '<h2>社会教育法第12条は、門前払いの根拠ではない</h2>': '<h2>社会教育法第12条と学校管理</h2>',
            '<div class="thesis-quote">「PTAに関与できない」のではなく、「PTA内部を支配してはならない」。その一方で、学校が任意団体のために何をしているかは確認しなければならない。</div>': '<div class="thesis-quote">PTA内部の自治を尊重し、学校がPTAのために行う事務と公的資源の利用を確認します。</div>',
            '<h2>教育委員会が制度として整えるべきこと</h2>': '<h2>学校側の行為基準</h2>',
            '<p>必要なのは、PTAに対する命令ではなく、学校側の行為基準です。教育委員会が「学校はどこまで協力できるか」「どこから先はPTA自身が担うべきか」を明文化すれば、校長は個人判断でPTA役員や保護者と対立せずに済みます。</p>': '<p>教育委員会は、学校が協力できる範囲と、PTAが自ら担う団体運営を明文化します。</p>',
            '<li><strong>相談対応の入口を閉じない</strong><br/>「PTAの問題」で門前払いせず、学校が関与した部分については学校管理上の相談として受け付ける。</li>': '<li><strong>相談対応</strong><br/>学校が関与した部分を、学校管理上の相談として受け付ける。</li>',
            '<h2>教育委員会が確認すべき事実は明確です</h2>': '<h2>学校関与の確認事項</h2>',
            '<p>PTAが任意団体であることは、教育委員会が学校関与を点検しない理由になりません。学校が任意団体の本来事務を支えている場合、その部分は学校管理上の是正対象です。慣例で続いてきた運用でも、学校側が根拠を説明できないものは、停止・分離・明文化の対象になります。</p>': '<p>学校がPTAの団体運営を支えている場合は、その根拠、決裁、責任主体、停止条件を確認します。</p>',
            '<h2>このページで確認すること</h2>': '<h2>確認事項</h2>',
            '<p>このページは、PTA内部の自治ではなく、学校側の関与を確認するための論点整理です。教育委員会・学校管理職は、PTAの役員人事や活動内容を支配するのではなく、学校が管理する資源と職員の行為を点検します。</p>': '<p>教育委員会・学校管理職は、学校が管理する資源と職員の行為を確認します。</p>'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          text = re.sub(r'<div class="hero-actions">.*?</div>', '', text, count=1, flags=re.S)
          text = re.sub(r'<figure class="diagram-figure"[^>]*>.*?国家賠償.*?</figure>', '', text, count=1, flags=re.S)
          text = re.sub(r'<div class="thesis-related">.*?</div>', '', text, count=1, flags=re.S)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add edu-board-separation.html education-board-responsibility.html
          if git diff --cached --quiet; then
            echo "No education board changes needed"
          else
            git commit -m "Simplify education board guidance wording"
            git push origin main
          fi
