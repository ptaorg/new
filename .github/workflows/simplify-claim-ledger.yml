name: Simplify evidence ledger

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  simplify-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Simplify ledger wording
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('claim-evidence-ledger.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '<title>主張と根拠の対応表 | PTA適正化推進委員会</title>': '<title>根拠台帳 | PTA適正化推進委員会</title>',
            'PTA問題の主張を、法令、横浜市通知、個人情報保護委員会資料、学校配布文書、教育委員会回答、提出文例へ対応させる根拠台帳です。': 'PTAの各論点について、法令、行政資料、学校文書、教育委員会回答、提出文例を対応させた根拠台帳です。',
            '<meta property="og:title" content="主張と根拠の対応表 | PTA適正化推進委員会">': '<meta property="og:title" content="根拠台帳 | PTA適正化推進委員会">',
            'PTA問題の主張を、法令、公式資料、実物文書、提出文例へ対応させ、断定しすぎず検証可能に整理します。': '法令、公式資料、実物文書、提出文例を論点別に整理します。',
            '<h1>主張と根拠の対応表</h1>': '<h1>根拠台帳</h1>',
            'PTA問題の主張を、法令、横浜市教育委員会通知、個人情報保護委員会資料、学校配布文書、教育委員会回答、提出文例に対応させます。資料から直接言えること、確認が必要なこと、分析として書くことを分けるための台帳です。': '法令、行政資料、学校文書、教育委員会回答、提出文例を論点別に整理しています。',
            '<h2>根拠台帳の目的</h2>': '<h2>確認軸</h2>',
            '任意加入、個人情報、会費、教職員関与、施設利用は、論点ごとに根拠資料が異なります。法令名だけを並べても、学校現場の運用確認には届きません。逆に、学校配布文書だけを見ても、どの法令・通知と結びつくのかが見えにくくなります。': '任意加入、個人情報、会費、教職員関与、施設利用について、根拠資料と学校現場の文書を対応させます。',
            'この対応表では、確認軸ごとに「根拠資料」「確認すべき実物資料」「提出文書」「留保事項」を並べます。教育委員会や学校へ文書を出す前に、事実と評価を区別するための台帳です。': '確認軸ごとに、根拠資料、実物資料、提出文書、留保事項を掲載しています。',
            '個別事案の結論は、会則、配布文書、同意書、会費通知、口座資料、教育委員会回答、対象年度によって変わります。このページは資料整理の型であり、個別の法的助言や結論を保証するものではありません。': '個別事案は、会則、配布文書、同意書、会費通知、口座資料、教育委員会回答、対象年度を確認してください。',
            '一般論の根拠として強いが、個別事実は別に確認する。': '法令・制度の根拠。個別事実は別途確認する。',
            '自治体実務の説明に使えるが、対象校・対象年度を確認する。': '自治体実務の資料。対象校・対象年度を確認する。',
            '法令、通知、回答、実物文書をつないだ評価。断定ではなく、根拠との接続を示して書く。': '法令、通知、回答、実物文書を接続した分析。根拠との対応を明記する。',
            '資料不足のため、確認事項として残す項目。ここを無理に結論へしない。': '資料不足のため確認事項として残す項目。',
            '<h2>主張、根拠、提出文書の対応表</h2>': '<h2>確認軸・根拠・提出文書</h2>',
            '<p>表の「主張」は公開文や提出文にそのまま入れる断定文ではありません。根拠がそろっているかを確認するための見出しです。</p>': '',
            '<th>主張・確認軸</th>': '<th>確認軸</th>',
            '教職員の協力全般を問題にするのではなく、学校職務として行った事務、金銭、勤務時間、公費・公有財産との接続を確認する。': '学校職務として行った事務、金銭、勤務時間、公費・公有財産との接続を確認する。',
            '許可や減免の有無、学校教育目的との関係、利用主体、費用負担を資料で分ける。単なる利用事実だけで結論を急がない。': '許可や減免の有無、学校教育目的との関係、利用主体、費用負担を確認する。',
            '資料が増えるほど、ファイル名やメモだけでは根拠が追えなくなります。台帳では、資料そのものと、そこから言える主張を分けて管理します。': '資料名、作成主体、日付、対象、確認軸、根拠、未確認事項を台帳で管理します。'
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run checks
        run: npm test
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add claim-evidence-ledger.html
          if git diff --cached --quiet; then
            echo "No ledger changes needed"
          else
            git commit -m "Simplify evidence ledger wording"
            git push origin main
          fi
