name: Full-site visual audit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Apply visual consistency stylesheet
        if: github.event_name == 'pull_request' && github.head_ref == 'visual-audit-20260711'
        run: |
          python3 tools/apply-site-consistency-import-20260711.py
          python3 tools/apply-site-consistency-links-20260711.py

      - name: Commit visual consistency stylesheet links
        if: github.event_name == 'pull_request' && github.head_ref == 'visual-audit-20260711'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Consistency stylesheet already applied"
          else
            git commit -m "Apply sitewide visual consistency stylesheet"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/pta-visual-server.log 2>&1 &
          echo $! > /tmp/pta-visual-server.pid
          sleep 2
          curl --fail http://127.0.0.1:4173/index.html >/dev/null

      - name: Run structural checks
        continue-on-error: true
        run: npm test

      - name: Run Chromium audit
        run: node scripts/visual-audit.mjs

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pta-full-site-visual-audit
          path: visual-audit-output/
          retention-days: 7
