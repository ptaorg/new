body{background:#f8fafc;color:#1f2937}.nm-hero{background:linear-gradient(135deg,#061426,#12345a);color:#fff;padding:46px 20px;border-bottom:4px solid #d4af37}.nm-wrap{max-width:1080px;margin:0 auto}.nm-hero h1{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,4vw,2.8rem);margin:0 0 12px;color:#fff}.nm-hero p{max-width:760px;line-height:1.9;color:rgba(255,255,255,.88);margin:0}.nm-main{max-width:1080px;margin:0 auto;padding:34px 20px 70px}.nm-sec{background:#fff;border:1px solid #dbe4ee;border-radius:14px;padding:26px 28px;margin:0 0 24px;box-shadow:0 10px 26px rgba(5,17,31,.06)}.nm-sec h2{font-family:'Noto Serif JP',serif;color:#1e3a5f;border-bottom:2px solid #1e3a5f;padding-bottom:8px;margin:0 0 14px}.nm-sec p{line-height:1.9;color:#334155}.nm-table{width:100%;border-collapse:collapse;min-width:760px}.nm-table th,.nm-table td{border-bottom:1px solid #e5edf5;padding:12px 13px;text-align:left;vertical-align:top;line-height:1.7}.nm-table th{background:#f1f5f9;color:#1e3a5f}.nm-scroll{overflow-x:auto;border:1px solid #dbe4ee;border-radius:12px}.nm-tag{display:inline-block;border:1px solid #cbd5e1;border-radius:999px;padding:2px 8px;margin:2px;font-size:.75rem;background:#f8fafc}.nm-btn{display:inline-block;margin:6px 8px 6px 0;padding:10px 16px;border-radius:999px;background:#1e3a5f;color:#fff;text-decoration:none;font-weight:800}.nm-btn.sub{background:#fff;color:#1e3a5f;border:1px solid #1e3a5f}.nm-footer{background:#061426;color:#fff;padding:28px 20px}.nm-footer a{color:#f4e7a6;margin-right:14px}@media(max-width:700px){.nm-sec{padding:22px 18px}}

<section class="nm-hero"><div class="nm-wrap"><h1>全国PTA資料・回答集</h1><p>全国の自治体・学校別PTA資料を、自治体別・学校別に整理しています。</p></div></section>
<main class="nm-main">
<section class="nm-sec"><h2>自治体別フォルダ</h2><p><a class="nm-btn" href="https://drive.google.com/drive/folders/1tbfpjRNJIhwQypk1vsAOaE7_qwW-lrm5" target="_blank" rel="noopener">Drive親フォルダを開く</a><a class="nm-btn sub" href="assets/data/national-materials.json">目録JSON</a><a class="nm-btn sub" href="national-archive.html">既存の全国資料館</a></p><div class="nm-scroll"><table class="nm-table"><thead><tr><th>自治体・区分</th><th>確認状況</th><th>主な論点</th><th>原本</th></tr></thead><tbody id="folders"><tr><td colspan="4">目録を読み込み中です。</td></tr></tbody></table></div></section>
<section class="nm-sec"><h2>代表資料</h2><div class="nm-scroll"><table class="nm-table"><thead><tr><th>自治体</th><th>資料</th><th>メモ</th><th>原本</th></tr></thead><tbody id="materials"><tr><td colspan="4">代表資料を読み込み中です。</td></tr></tbody></table></div></section>
</main>
<footer class="nm-footer"><div class="nm-wrap"><strong>PTA適正化推進委員会</strong><p><a href="documents.html">資料入口・索引</a><a href="national-archive.html">全国資料館</a><a href="board-responses.html">教育委員会の回答</a></p></div></footer>
<script>
fetch('assets/data/national-materials.json').then(r=>r.json()).then(d=>{document.getElementById('folders').innerHTML=d.municipalFolders.map(x=>`<tr><td><strong>${e(x.name)}</strong><br>${e(x.prefecture||'')}</td><td>${e(x.observed||'')}</td><td>${(x.primaryIssues||[]).map(t=>`<span class="nm-tag">${e(t)}</span>`).join('')}</td><td><a href="${x.folderUrl}" target="_blank" rel="noopener">Drive</a></td></tr>`).join('');document.getElementById('materials').innerHTML=d.selectedMaterials.map(x=>`<tr><td>${e(x.municipality)}</td><td><strong>${e(x.school)}</strong><br>${e(x.title)}<br>${e(x.type)}</td><td>${e(x.summary)}<br>${(x.issues||[]).map(t=>`<span class="nm-tag">${e(t)}</span>`).join('')}</td><td><a href="${x.sourceUrl}" target="_blank" rel="noopener">原本</a></td></tr>`).join('')}).catch(()=>{document.getElementById('folders').innerHTML='<tr><td colspan="4">目録を読み込めませんでした。Drive親フォルダを確認してください。</td></tr>'});function e(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
</script>
</body>
