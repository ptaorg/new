<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 367" width="760" height="367" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="学校保有情報を使うルートと、PTAが直接取得するルート"><rect x="1.0" y="1.0" width="758.0" height="365.2" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">個人情報</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">学校保有情報を使うルートと、PTAが直接取得するルート</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="104.0" width="335.0" height="181.4" rx="13" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="104.0" width="335.0" height="4.0" rx="2" fill="#a8261b"/><text x="50.0" y="136.0" font-size="15" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">学校保有情報をPTAへ提供</text><circle cx="54" cy="158" r="3" fill="#a8261b"/><text x="68.0" y="162.0" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">本人同意のない第三者提供</text><circle cx="54" cy="184.45" r="3" fill="#a8261b"/><text x="68.0" y="188.4" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">収集目的を超える目的外利用</text><circle cx="54" cy="210.89999999999998" r="3" fill="#a8261b"/><text x="68.0" y="214.9" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校が保有する名簿の流用</text><rect x="46.0" y="251.4" width="307.0" height="24.0" rx="12" fill="#f8ebe8"/><circle cx="60" cy="263.35" r="14" fill="#a8261b"/><path d="M55 258.35 l10 10 M65 258.35 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="78.0" y="267.4" font-size="12" fill="#a8261b" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">原則禁止</text><rect x="393.0" y="104.0" width="335.0" height="181.4" rx="13" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="393.0" y="104.0" width="335.0" height="4.0" rx="2" fill="#1f7a45"/><text x="411.0" y="136.0" font-size="15" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTAが本人から直接取得</text><circle cx="415.0" cy="158" r="3" fill="#1f7a45"/><text x="429.0" y="162.0" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会申込書で連絡先を記入</text><circle cx="415.0" cy="184.45" r="3" fill="#1f7a45"/><text x="429.0" y="188.4" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">利用目的を明示して取得</text><circle cx="415.0" cy="210.89999999999998" r="3" fill="#1f7a45"/><text x="429.0" y="214.9" font-size="12.3" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAが自ら管理・更新</text><rect x="407.0" y="251.4" width="307.0" height="24.0" rx="12" fill="#e9f1ea"/><circle cx="421.0" cy="263.35" r="14" fill="#1f7a45"/><path d="M415.0 263.35 l4 4 8-9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="439.0" y="267.4" font-size="12" fill="#1f7a45" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">適正</text><g transform="translate(380.0,194.675)"><text x="0.0" y="-12.0" font-size="10.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">適正化</text><line x1="-21.0" y1="0.0" x2="14.0" y2="0.0" stroke="#bd9628" stroke-width="3"/><path d="M12 -6 L21 0 L12 6 Z" fill="#bd9628"/></g><text x="32.0" y="307.4" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">名簿提供の可否は「PTAが公益的か」ではなく、学校保有情報を目的外に使う根拠があるか、という問題。</text><text x="32.0" y="336.7" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 個人情報保護法69条（目的外利用・第三者提供の制限）</text></svg>