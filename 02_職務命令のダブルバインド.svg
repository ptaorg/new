<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 396" width="760" height="396" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="職務命令の「ある・なし」どちらでも違法"><rect x="1.0" y="1.0" width="758.0" height="393.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">教職員関与</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">職務命令の「ある・なし」どちらでも違法</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="241.6" y="108.0" width="276.8" height="61.0" rx="12" fill="#1e3a5f" stroke="#1e3a5f" stroke-width="1"/><text x="380.0" y="136.0" font-size="14.5" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">教職員が勤務時間中にPTA事務に従事</text><text x="380.0" y="167.0" font-size="1" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif"></text><path d="M380.0 169 C 380.0 195, 201.0 197, 201.0 223" fill="none" stroke="#bd9628" stroke-width="2.5"/><path d="M196.0 216 L201.0 223 L206.0 216 Z" fill="#bd9628"/><path d="M380.0 169 C 380.0 195, 559.0 197, 559.0 223" fill="none" stroke="#bd9628" stroke-width="2.5"/><path d="M554.0 216 L559.0 223 L564.0 216 Z" fill="#bd9628"/><rect x="32.0" y="223.0" width="338.0" height="114.0" rx="12" fill="#fff" stroke="#a8261b" stroke-width="1"/><circle cx="56.0" cy="249" r="14" fill="#a8261b"/><path d="M51.0 244 l10 10 M61.0 244 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="76.0" y="245.0" font-size="12.8" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">職務命令がある</text><text x="48.0" y="270.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAは私的団体。命令は職務権限の範囲外＝権限逸脱</text><g transform="translate(201.0,319)"><rect x="-40.5" y="-13.0" width="81.0" height="26" rx="13" fill="#f8ebe8"/><text x="0.0" y="4.5" font-size="11" fill="#a8261b" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">命令の限界</text></g><rect x="390.0" y="223.0" width="338.0" height="114.0" rx="12" fill="#fff" stroke="#a8261b" stroke-width="1"/><circle cx="414.0" cy="249" r="14" fill="#a8261b"/><path d="M409.0 244 l10 10 M419.0 244 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="434.0" y="245.0" font-size="12.8" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">職務命令がない</text><text x="406.0" y="270.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">法的根拠なき業務を勤務時間に実施</text><g transform="translate(559.0,319)"><rect x="-52.2" y="-13.0" width="104.3" height="26" rx="13" fill="#f8ebe8"/><text x="0.0" y="4.5" font-size="11" fill="#a8261b" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">地公法35条違反</text></g><text x="32.0" y="365.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 地方公務員法35条</text></svg>