<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="公（学校）と私（PTA）の境界線"><rect x="1.0" y="1.0" width="758.0" height="398.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">施設利用</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">公（学校）と私（PTA）の境界線</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="110.0" width="338.0" height="182.0" rx="12" fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="1"/><rect x="32.0" y="110.0" width="338.0" height="4.0" rx="2" fill="#1e3a5f"/><rect x="390.0" y="110.0" width="338.0" height="182.0" rx="12" fill="#f3e8c4" fill-opacity="0.4" stroke="#bd9628" stroke-width="1"/><rect x="390.0" y="110.0" width="338.0" height="4.0" rx="2" fill="#bd9628"/><line x1="380.0" y1="104" x2="380.0" y2="298" stroke="#bd9628" stroke-width="3"/><text x="217.0" y="140.0" font-size="14.5" fill="#1e3a5f" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">公（学校）</text><text x="559.0" y="140.0" font-size="14.5" fill="#7a5d14" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">私（PTA）</text><circle cx="54" cy="166" r="3" fill="#1e3a5f"/><text x="66.0" y="170.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">公費で整備・管理する施設</text><circle cx="54" cy="196" r="3" fill="#1e3a5f"/><text x="66.0" y="200.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校教育の目的に供する</text><circle cx="54" cy="226" r="3" fill="#1e3a5f"/><text x="66.0" y="230.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">管理責任は学校長</text><circle cx="410.0" cy="166" r="3" fill="#bd9628"/><text x="422.0" y="170.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">任意団体としての利用</text><circle cx="410.0" cy="196" r="3" fill="#bd9628"/><text x="422.0" y="200.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">利用には許可と条件が必要</text><circle cx="410.0" cy="226" r="3" fill="#bd9628"/><text x="422.0" y="230.0" font-size="12" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">費用・責任の所在を明確に</text><rect x="32.0" y="306.0" width="696.0" height="36.0" rx="10" fill="#f8ebe8"/><text x="48.0" y="326.0" font-size="12" fill="#a8261b" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">使うこと自体ではなく、許可・費用・責任の境界が曖昧なことが問題。</text><text x="32.0" y="370.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 学校教育法137条／地方財政法</text></svg>