<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 382" width="820" height="382" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="手元の文書で確認するポイント"><rect x="1.0" y="1.0" width="818.0" height="379.5" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">保護者</text><line x1="32.0" y1="49.0" x2="76.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">手元の文書で確認するポイント</text><line x1="32.0" y1="74.0" x2="788.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="32.0" y="106.0" width="756.0" height="40.0" rx="8" fill="#1e3a5f"/><text x="44.0" y="131.0" font-size="12.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">手元の文書</text><text x="270.8" y="131.0" font-size="12.5" fill="#fff" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">確認ポイント</text><rect x="32.0" y="146.0" width="756.0" height="35.4" rx="0" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="168.0" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入学時の一括書類</text><text x="270.8" y="168.0" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTA入会が自動扱いになっていないか</text><rect x="32.0" y="181.4" width="756.0" height="35.4" rx="0" fill="#faf8f2" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="203.4" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">会費の引落し案内</text><text x="270.8" y="203.4" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校徴収金と同じ口座・案内になっていないか</text><rect x="32.0" y="216.8" width="756.0" height="35.4" rx="0" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="238.8" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">役員・委員の選出文書</text><text x="270.8" y="238.8" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会確認より先に役員希望を書かされていないか</text><rect x="32.0" y="252.2" width="756.0" height="35.4" rx="0" fill="#faf8f2" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="274.2" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">名簿・連絡網</text><text x="270.8" y="274.2" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">同意なく連絡先がPTAに渡っていないか</text><rect x="32.0" y="287.6" width="756.0" height="35.4" rx="0" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><text x="44.0" y="309.6" font-size="11.6" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">退会・非加入の扱い</text><text x="270.8" y="309.6" font-size="11.6" fill="#1c232e" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">子への不利益が示唆されていないか</text><line x1="258.8" y1="106.0" x2="258.8" y2="323.0" stroke="#e7e2d6" stroke-width="1"/><rect x="32.0" y="106.0" width="756.0" height="217.0" rx="8" fill="none" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="351.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： PTA適正化推進委員会 保護者ガイド</text></svg>