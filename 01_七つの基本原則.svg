<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 678" width="760" height="678" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="適正化の「七つの基本原則」"><rect x="1.0" y="1.0" width="758.0" height="675.9" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">適正化とは</text><line x1="32.0" y1="49.0" x2="100.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">適正化の「七つの基本原則」</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="110.0" y="108.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="108.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="136.0" r="22" fill="#1e3a5f"/><text x="60.0" y="141.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">1</text><text x="130.0" y="133.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">入会は任意（オプトイン）</text><text x="130.0" y="150.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">入会申込書による意思確認</text><line x1="60.0" y1="162.0" x2="60.0" y2="171.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 169 L60 178 L66 169 Z" fill="#bd9628"/><rect x="110.0" y="180.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="180.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="208.0" r="22" fill="#1e3a5f"/><text x="60.0" y="213.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">2</text><text x="130.0" y="205.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">公私の分離</text><text x="130.0" y="222.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">学校とPTAの組織・会計・情報を切り分ける</text><line x1="60.0" y1="234.0" x2="60.0" y2="243.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 241 L60 250 L66 241 Z" fill="#bd9628"/><rect x="110.0" y="252.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="252.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="280.0" r="22" fill="#1e3a5f"/><text x="60.0" y="285.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">3</text><text x="130.0" y="277.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">会計の独立</text><text x="130.0" y="294.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAが自ら徴収・管理・説明する</text><line x1="60.0" y1="306.0" x2="60.0" y2="315.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 313 L60 322 L66 313 Z" fill="#bd9628"/><rect x="110.0" y="324.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="324.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="352.0" r="22" fill="#1e3a5f"/><text x="60.0" y="357.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">4</text><text x="130.0" y="349.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">個人情報の直接収集</text><text x="130.0" y="366.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">本人から取得し、学校情報に依存しない</text><line x1="60.0" y1="378.0" x2="60.0" y2="387.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 385 L60 394 L66 385 Z" fill="#bd9628"/><rect x="110.0" y="396.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="396.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="424.0" r="22" fill="#1e3a5f"/><text x="60.0" y="429.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">5</text><text x="130.0" y="421.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">教職員の非関与</text><text x="130.0" y="438.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">勤務時間中の私団体事務を解消</text><line x1="60.0" y1="450.0" x2="60.0" y2="459.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 457 L60 466 L66 457 Z" fill="#bd9628"/><rect x="110.0" y="468.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="468.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="496.0" r="22" fill="#1e3a5f"/><text x="60.0" y="501.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">6</text><text x="130.0" y="493.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">施設の適正利用</text><text x="130.0" y="510.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">許可・費用・責任を明確化</text><line x1="60.0" y1="522.0" x2="60.0" y2="531.0" stroke="#bd9628" stroke-width="2.5"/><path d="M54 529 L60 538 L66 529 Z" fill="#bd9628"/><rect x="110.0" y="540.0" width="618.0" height="56.0" rx="10" fill="#fff" stroke="#e7e2d6" stroke-width="1"/><rect x="110.0" y="540.0" width="6.0" height="56.0" rx="3" fill="#bd9628"/><circle cx="60" cy="568.0" r="22" fill="#1e3a5f"/><text x="60.0" y="573.0" font-size="15" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">7</text><text x="130.0" y="565.0" font-size="13.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">説明責任</text><text x="130.0" y="582.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">誰に対しても運営を説明できる状態</text><text x="32.0" y="618.0" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">適正化はPTAの否定ではなく、自立した任意団体への移行。</text><text x="32.0" y="647.4" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： PTA適正化推進委員会</text></svg>