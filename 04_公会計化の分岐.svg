<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 438" width="760" height="438" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif" role="img" aria-label="文科省ガイドラインが示す「2つの道」"><rect x="1.0" y="1.0" width="758.0" height="436.2" rx="16" fill="#ffffff" stroke="#e7e2d6" stroke-width="1"/><text x="32.0" y="38.0" font-size="12" fill="#7a5d14" font-weight="700" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">会費徴収</text><line x1="32.0" y1="49.0" x2="88.0" y2="49.0" stroke="#bd9628" stroke-width="2"/><text x="32.0" y="72.0" font-size="18.5" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">文科省ガイドラインが示す「2つの道」</text><line x1="32.0" y1="74.0" x2="728.0" y2="74.0" stroke="#bd9628" stroke-width="2"/><rect x="207.0" y="108.0" width="346.0" height="61.0" rx="12" fill="#1e3a5f" stroke="#1e3a5f" stroke-width="1"/><text x="380.0" y="136.0" font-size="14.5" fill="#fff" font-weight="700" text-anchor="middle" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">学校徴収金の徴収・管理（文科省ガイドライン）</text><path d="M380.0 169 C 380.0 195, 141.33333333333331 197, 141.33333333333331 223" fill="none" stroke="#bd9628" stroke-width="2.5"/><path d="M136.33333333333331 216 L141.33333333333331 223 L146.33333333333331 216 Z" fill="#bd9628"/><path d="M380.0 169 C 380.0 195, 379.99999999999994 197, 379.99999999999994 223" fill="none" stroke="#bd9628" stroke-width="2.5"/><path d="M374.99999999999994 216 L379.99999999999994 223 L384.99999999999994 216 Z" fill="#bd9628"/><path d="M380.0 169 C 380.0 195, 618.6666666666666 197, 618.6666666666666 223" fill="none" stroke="#bd9628" stroke-width="2.5"/><path d="M613.6666666666666 216 L618.6666666666666 223 L623.6666666666666 216 Z" fill="#bd9628"/><rect x="32.0" y="223.0" width="218.7" height="114.0" rx="12" fill="#fff" stroke="#1f7a45" stroke-width="1"/><circle cx="56.0" cy="249" r="14" fill="#1f7a45"/><path d="M50.0 249 l4 4 8-9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="76.0" y="245.0" font-size="12.8" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">公会計化</text><text x="48.0" y="270.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">給食費等は自治体の歳入へ</text><g transform="translate(141.33333333333331,319)"><rect x="-40.5" y="-13.0" width="81.0" height="26" rx="13" fill="#e9f1ea"/><text x="0.0" y="4.5" font-size="11" fill="#1f7a45" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">適切な種目</text></g><rect x="270.7" y="223.0" width="218.7" height="114.0" rx="12" fill="#fff" stroke="#1f7a45" stroke-width="1"/><circle cx="294.66666666666663" cy="249" r="14" fill="#1f7a45"/><path d="M288.66666666666663 249 l4 4 8-9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="314.7" y="245.0" font-size="12.8" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">直接納付（直接購入）</text><text x="286.7" y="270.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTA会費はPTAが独自に集める</text><g transform="translate(379.99999999999994,319)"><rect x="-44.2" y="-13.0" width="88.5" height="26" rx="13" fill="#e9f1ea"/><text x="0.0" y="4.5" font-size="11" fill="#1f7a45" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAはこちら</text></g><rect x="509.3" y="223.0" width="218.7" height="114.0" rx="12" fill="#fff" stroke="#a8261b" stroke-width="1"/><circle cx="533.3333333333333" cy="249" r="14" fill="#a8261b"/><path d="M528.3333333333333 244 l10 10 M538.3333333333333 244 l-10 10" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/><text x="553.3" y="245.0" font-size="12.8" fill="#1e3a5f" font-weight="700" text-anchor="start" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif">PTA会費を公会計化</text><text x="525.3" y="270.0" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">私的団体の会費は公金化できない</text><g transform="translate(618.6666666666666,319)"><rect x="-24.0" y="-13.0" width="48.0" height="26" rx="13" fill="#f8ebe8"/><text x="0.0" y="4.5" font-size="11" fill="#a8261b" font-weight="700" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">不可</text></g><text x="32.0" y="359.0" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">PTAは私的団体ゆえ公会計化の対象外。ガイドラインの文言どおりなら学校による代行徴収は廃止し、独自徴収へ移行</text><text x="32.0" y="378.4" font-size="12.5" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">すべき。</text><text x="32.0" y="407.8" font-size="11" fill="#5c6675" font-weight="400" text-anchor="start" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">出典： 文科省「学校給食費等の徴収等の公会計化等の推進について（ガイドライン）」2019</text></svg>