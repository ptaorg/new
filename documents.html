<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <link rel="canonical" href="https://ptaorg.com/documents.html">

  <meta property="og:image" content="https://ptaorg.com/assets/og-image-popc-en.png">

  <link href="css/style.css" rel="stylesheet">
  <link href="css/refine.css?v=refine1" rel="stylesheet">
  <style>
    body{min-height:100vh;background:#f4f6f9;color:#1e3a5f;font-family:'Noto Sans JP',system-ui,sans-serif;line-height:1.85;margin:0;padding:24px}
    .redirect-box{max-width:860px;margin:8vh auto;background:#fff;border:1px solid #dbe4ee;border-left:7px solid #d4af37;border-radius:0 18px 18px 0;padding:34px 38px;box-shadow:0 14px 34px rgba(5,17,31,.08)}
    h1{font-family:'Noto Serif JP',serif;font-size:clamp(1.45rem,4vw,2.25rem);margin:0 0 12px;color:#1e3a5f;line-height:1.35}
    h2{font-family:'Noto Serif JP',serif;font-size:1.08rem;margin:28px 0 10px;color:#1e3a5f;border-top:1px solid #dbe4ee;padding-top:18px}
    p{margin:0 0 16px;color:#334155}
    .legacy-note{display:none;background:#fff7ed;border:1px solid #fed7aa;border-left:5px solid #ea580c;padding:14px 16px;margin:18px 0;color:#7c2d12}
    .legacy-note.is-active{display:block}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .actions a{display:inline-flex;align-items:center;background:#1e3a5f;color:#fff;text-decoration:none;border-radius:999px;padding:10px 16px;font-weight:900}
    .actions a.primary{background:#ea580c}
    .actions a:hover{filter:brightness(.92)}
    code{background:#f1f5f9;border:1px solid #dbe4ee;border-radius:6px;padding:1px 6px;color:#0f172a}
  </style>
</head>
<body>
  <main class="redirect-box">
    <h1>資料解説ページは、全国資料館・行政資料ページへ整理しました。</h1>
    <p>旧来の <code>documents.html?id=...</code> 形式のURLは互換のため残しています。資料IDが指定されている場合は、現在の掲載先を明示します。</p>
    <div class="legacy-note" id="legacyNote" aria-live="polite">
      <p><strong>旧資料ID：</strong><code id="legacyId"></code></p>
      <p id="legacyText">関連する資料ページへ移動できます。</p>
      <div class="actions"><a class="primary" id="legacyLink" href="national-archive.html">現在の掲載先を開く</a></div>
    </div>
    <h2>主な移動先</h2>
    <p>自治体別・学校別の実資料は全国資料館へ、通知・法令・行政回答の根拠資料は行政資料ページへ、教育委員会向け・PTA役員向けの解説は各ガイドページへ整理しています。</p>
    <div class="actions">
      <a class="primary" href="national-archive.html">全国資料館を開く</a>
      <a href="administrative-materials.html">行政資料ページを開く</a>
      <a href="guide-board.html">教育委員会向けガイドを開く</a>
      <a href="guide-pta.html">PTA役員向けガイドを開く</a>
    </div>
  </main>
  <script>
    const destinations = {
      'yokohama-notice': ['administrative-materials.html#ed-resource-set', '横浜市通知は、行政資料ページの教育委員会向け資料セットに整理しています。'],
      'yokohama-bessi': ['administrative-materials.html#ed-resource-set', '横浜市通知の別紙・様式は、行政資料ページの教育委員会向け資料セットに整理しています。'],
      'ppc-personal-info': ['guide-board.html#key-materials', '個人情報保護委員会資料は、教育委員会向けガイドの根拠資料欄に整理しています。'],
      'mext-accounting-notice': ['guide-board.html#key-materials', '学校徴収金・会計関連資料は、教育委員会向けガイドの根拠資料欄に整理しています。'],
      'mext-koukaikkei-2025': ['guide-board.html#key-materials', '公会計化・学校徴収金関連資料は、教育委員会向けガイドの根拠資料欄に整理しています。'],
      'mext-pta-survey-2025': ['guide-board.html#key-materials', 'PTA関連調査資料は、教育委員会向けガイドの根拠資料欄に整理しています。'],
      'mext-toshin2019': ['guide-board.html#key-materials', '文部科学省答申・関連資料は、教育委員会向けガイドの根拠資料欄に整理しています。'],
      'atsugi-pta-notice': ['guide-board.html#municipal-voices', '厚木市通知は、教育委員会向けガイドの自治体動向欄に整理しています。'],
      'guidebook-board': ['guide-board.html#board-ed-resource-set', '教育委員会向け資料セットは、教育委員会向けガイド内に整理しています。'],
      'guidebook-pta': ['PTA運営適正化ガイドブック_第4版_改訂本文.html', 'PTA運営適正化ガイドブック本文へ移動できます。'],
      'pta-voluntary-kamino': ['guide-parent.html#parent-document-check', 'PTA任意加入に関する資料確認は、保護者向けガイドの文書確認欄に整理しています。']
    };
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (id) {
      const target = destinations[id] || ['national-archive.html', '指定された旧資料IDに完全対応する個別ページが見つからないため、全国資料館へ案内します。'];
      document.getElementById('legacyId').textContent = id;
      document.getElementById('legacyText').textContent = target[1];
      document.getElementById('legacyLink').href = target[0];
      document.getElementById('legacyNote').classList.add('is-active');
    }
  </script>
</body>
</html>
